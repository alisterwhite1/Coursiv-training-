<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SiteSnag — Construction Inspection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #1d4ed8;
      --blue-bg:     #dbeafe;
      --orange:      #ea580c;
      --orange-bg:   #ffedd5;
      --green:       #15803d;
      --green-bg:    #dcfce7;
      --red:         #dc2626;
      --red-bg:      #fee2e2;
      --purple:      #7c3aed;
      --purple-bg:   #ede9fe;
      --amber:       #b45309;
      --amber-bg:    #fef3c7;
      --bg:          #f1f5f9;
      --card:        #ffffff;
      --text:        #0f172a;
      --soft:        #475569;
      --muted:       #94a3b8;
      --border:      #e2e8f0;
      --radius:      14px;
      --shadow:      0 1px 4px rgba(0,0,0,.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 76px;
      font-size: 15px;
    }

    /* ── App header ── */
    .app-bar {
      background: var(--blue);
      color: #fff;
      padding: .85rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      position: sticky;
      top: 0;
      z-index: 90;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .app-bar h1 { font-size: 1.05rem; font-weight: 700; flex: 1; line-height: 1.2; }
    .app-bar h1 small { display: block; font-size: .72rem; font-weight: 400; opacity: .7; }
    .back-btn {
      background: none; border: none; color: rgba(255,255,255,.85);
      font-size: 1.4rem; cursor: pointer; padding: 0 .2rem; line-height: 1;
    }
    .back-btn:hover { color: #fff; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      display: flex; z-index: 90;
      box-shadow: 0 -2px 12px rgba(0,0,0,.07);
    }
    .nav-btn {
      flex: 1; border: none; background: none;
      padding: .6rem .3rem .45rem;
      display: flex; flex-direction: column; align-items: center; gap: .18rem;
      cursor: pointer; color: var(--muted);
      font-size: .65rem; font-weight: 700; letter-spacing: .02em;
      transition: color .12s; font-family: inherit;
    }
    .nav-btn .ico { font-size: 1.3rem; line-height: 1; }
    .nav-btn.active { color: var(--blue); }

    /* ── Main ── */
    .main { padding: .85rem; max-width: 580px; margin: 0 auto; }

    /* ── Mode toggle ── */
    .mode-strip {
      display: flex; background: var(--bg);
      border-radius: 999px; padding: .22rem;
      margin-bottom: .9rem; border: 1.5px solid var(--border);
    }
    .mode-btn {
      flex: 1; padding: .48rem .6rem;
      border: none; border-radius: 999px; background: none;
      font-size: .82rem; font-weight: 700; cursor: pointer;
      color: var(--muted); transition: all .15s; font-family: inherit;
    }
    .mode-btn.active { background: #fff; color: var(--blue); box-shadow: var(--shadow); }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .card + .card, .card + .sec-label + .card { margin-top: .75rem; }
    .card-body { padding: 1rem; }

    /* ── List items ── */
    .list-item {
      display: flex; align-items: center;
      padding: .82rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; gap: .8rem; transition: background .1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #f8fafc; }
    .list-item:active { background: var(--blue-bg); }

    /* ── Snag list ── */
    .snag-num {
      background: var(--blue); color: #fff;
      font-size: .75rem; font-weight: 800;
      border-radius: 7px; padding: .22rem .48rem;
      min-width: 48px; text-align: center; flex-shrink: 0;
    }
    .snag-info { flex: 1; min-width: 0; }
    .snag-title {
      font-weight: 600; font-size: .93rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .snag-meta { display: flex; align-items: center; gap: .45rem; margin-top: .2rem; flex-wrap: wrap; }
    .snag-co { font-size: .73rem; color: var(--soft); }
    .snag-thumb {
      width: 44px; height: 44px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
    }
    .snag-thumb-empty {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--bg); border: 1.5px dashed var(--border);
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; color: var(--muted); font-size: .95rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: .18rem .55rem; border-radius: 999px;
      font-size: .7rem; font-weight: 800;
      letter-spacing: .03em; white-space: nowrap;
    }
    .b-open     { background: var(--amber-bg);  color: var(--amber); }
    .b-assigned { background: var(--blue-bg);   color: var(--blue); }
    .b-pending  { background: var(--purple-bg); color: var(--purple); }
    .b-accepted { background: var(--green-bg);  color: var(--green); }
    .b-rejected { background: var(--red-bg);    color: var(--red); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: .4rem; padding: .62rem 1.25rem; border: none;
      border-radius: 999px; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: filter .15s, transform .1s;
      font-family: inherit; white-space: nowrap;
    }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-danger  { background: var(--red);   color: #fff; }
    .btn-outline {
      background: none; border: 2px solid var(--border); color: var(--soft);
    }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm { padding: .38rem .85rem; font-size: .82rem; }
    .btn-block { width: 100%; border-radius: var(--radius); }

    .fab {
      position: fixed; bottom: 86px; right: 1.1rem;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--blue); color: #fff; border: none;
      font-size: 1.7rem; cursor: pointer;
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
      z-index: 80; transition: transform .15s;
    }
    .fab:hover { transform: scale(1.07); }
    .fab:active { transform: scale(.9); }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: .38rem; }
    .form-group + .form-group { margin-top: .85rem; }
    .form-label {
      font-size: .73rem; font-weight: 800; color: var(--soft);
      text-transform: uppercase; letter-spacing: .07em;
    }
    input[type=text], input[type=date], textarea, select {
      width: 100%; padding: .62rem .9rem;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: .93rem; font-family: inherit; color: var(--text);
      background: #fff; outline: none; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 88px; }

    .photo-trigger {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .75rem; border: 2px dashed var(--border); border-radius: 10px;
      cursor: pointer; background: var(--bg); color: var(--soft);
      font-size: .9rem; font-weight: 600; transition: all .15s;
    }
    .photo-trigger:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
    .photo-wrap { position: relative; border-radius: 10px; overflow: hidden; }
    .photo-wrap img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
    .photo-remove {
      position: absolute; top: .45rem; right: .45rem;
      background: rgba(0,0,0,.55); color: #fff; border: none;
      border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .95rem;
    }

    .loc-row { display: flex; gap: .5rem; align-items: center; }
    .loc-chip {
      flex: 1; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: .5rem .75rem;
      font-size: .8rem; color: var(--soft); font-family: monospace;
    }

    /* ── Detail view ── */
    .detail-photo { width: 100%; max-height: 260px; object-fit: cover; display: block; }
    .detail-row {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .6rem 0; border-bottom: 1px solid var(--border); font-size: .9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      color: var(--muted); font-size: .73rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em;
      min-width: 88px; flex-shrink: 0; padding-top: .05rem;
    }
    .detail-val { flex: 1; }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: .55rem; }
    .tl-row { display: flex; gap: .65rem; align-items: flex-start; }
    .tl-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      margin-top: .35rem; background: var(--muted);
    }
    .tl-dot.g { background: var(--green); }
    .tl-dot.r { background: var(--red); }
    .tl-dot.b { background: var(--blue); }
    .tl-dot.p { background: var(--purple); }
    .tl-main { font-size: .87rem; font-weight: 600; }
    .tl-when { font-size: .73rem; color: var(--muted); }
    .tl-note { font-size: .8rem; color: var(--soft); margin-top: .12rem; white-space: pre-wrap; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: .5rem; padding: 1rem;
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .action-bar .btn { flex: 1; min-width: 110px; }

    /* ── Alerts ── */
    .alert {
      padding: .7rem 1rem; border-radius: 10px;
      font-size: .87rem; font-weight: 600; margin-bottom: .75rem;
    }
    .alert-info    { background: var(--blue-bg);   color: #1e3a8a; }
    .alert-success { background: var(--green-bg);  color: #14532d; }
    .alert-warn    { background: var(--amber-bg);  color: #78350f; }
    .alert-danger  { background: var(--red-bg);    color: #7f1d1d; }

    /* ── Project list ── */
    .proj-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; flex-shrink: 0;
    }
    .proj-name { font-weight: 700; font-size: .95rem; }
    .proj-count { font-size: .75rem; color: var(--muted); }
    .active-chip {
      margin-left: auto; background: var(--blue); color: #fff;
      font-size: .65rem; font-weight: 800; padding: .14rem .5rem;
      border-radius: 999px; letter-spacing: .04em;
    }

    /* ── Company ── */
    .co-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .co-name { flex: 1; font-weight: 600; }
    .del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.1rem; padding: .2rem .35rem;
      transition: color .15s;
    }
    .del-btn:hover { color: var(--red); }

    /* ── Filters ── */
    .filter-row {
      display: flex; gap: .3rem; overflow-x: auto; margin-bottom: .75rem;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: .35rem .8rem; border-radius: 999px;
      font-size: .76rem; font-weight: 700; border: 2px solid var(--border);
      background: #fff; color: var(--soft); cursor: pointer;
      transition: all .12s; font-family: inherit;
    }
    .filter-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── Misc ── */
    .sec-label {
      font-size: .69rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .11em; color: var(--muted); margin: 1.1rem 0 .45rem;
    }
    .empty { text-align: center; padding: 2.8rem 1rem; color: var(--muted); }
    .empty .eico { font-size: 2.2rem; margin-bottom: .4rem; }
    .empty p { font-size: .88rem; }
    .map-link {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .82rem; color: var(--blue); font-weight: 600; text-decoration: none;
    }
    .divider { height: 1px; background: var(--border); }

    /* ── Modal ── */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: #fff; border-radius: 18px 18px 0 0;
      padding: 1.4rem 1.1rem 1.6rem;
      width: 100%; max-width: 500px;
      box-shadow: 0 -4px 32px rgba(0,0,0,.15);
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: .55rem; margin-top: 1rem; }
    .modal-actions .btn { flex: 1; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── DB ─────────────────────────────────────────────────────────────────────────
const DB_KEY    = 'sitesnag_v1';
const STATE_KEY = 'sitesnag_state';
let db = { projects: [], companies: [], snags: [] };

function loadDB() {
  try { const s = JSON.parse(localStorage.getItem(DB_KEY)); if (s) db = { ...db, ...s }; } catch {}
}
function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ── STATE ──────────────────────────────────────────────────────────────────────
let S = {
  view: 'projects',
  projectId: null,
  snagId: null,
  mode: 'inspector',
  contractorCompanyId: null,
  filter: 'all',
  fd: {},
};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STATE_KEY));
    if (saved) {
      if (saved.projectId) S.projectId = saved.projectId;
      if (saved.mode)      S.mode      = saved.mode;
    }
  } catch {}
  // If a project was saved but no longer exists, clear it
  if (S.projectId && !db.projects.find(p => p.id === S.projectId)) S.projectId = null;
  // Auto-select the only project if there's exactly one
  if (!S.projectId && db.projects.length === 1) S.projectId = db.projects[0].id;
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({ projectId: S.projectId, mode: S.mode }));
}

// ── NAVIGATE ───────────────────────────────────────────────────────────────────
function go(view, params) {
  S.view = view;
  if (params) Object.assign(S, params);
  saveState();
  render();
}

// ── STATUS HELPERS ─────────────────────────────────────────────────────────────
const STATUSES = {
  open:     { label: 'Open',           cls: 'b-open' },
  assigned: { label: 'Assigned',       cls: 'b-assigned' },
  pending:  { label: 'Pending Review', cls: 'b-pending' },
  accepted: { label: 'Accepted ✓',     cls: 'b-accepted' },
  rejected: { label: 'Rejected',       cls: 'b-rejected' },
};
function badge(status) {
  const s = STATUSES[status] || STATUSES.open;
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

// ── DATE HELPERS ───────────────────────────────────────────────────────────────
function fmtDate(ts)     { return ts ? new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}) : '—'; }
function fmtDateTime(ts) { return ts ? new Date(ts).toLocaleString(undefined,{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }

// ── HTML ESCAPE ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── LOOKUPS ────────────────────────────────────────────────────────────────────
function proj()        { return db.projects.find(p => p.id === S.projectId); }
function coName(id)    { const c = db.companies.find(c => c.id === id); return c ? c.name : '—'; }
function snagCount(pid){ return db.snags.filter(s => s.projectId === pid).length; }
function nextNum(pid)  { const ns = db.snags.filter(s => s.projectId === pid).map(s => s.number); return ns.length ? Math.max(...ns)+1 : 1; }
function numStr(n)     { return '#' + String(n).padStart(3,'0'); }

// ── PHOTO RESIZE ───────────────────────────────────────────────────────────────
function resizePhoto(file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        let {width: w, height: h} = img;
        if (w > MAX || h > MAX) { if (w > h) { h = h*MAX/w; w = MAX; } else { w = w*MAX/h; h = MAX; } }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── GPS ────────────────────────────────────────────────────────────────────────
function getGPS() {
  const btn = document.getElementById('gpsBtn');
  if (btn) { btn.textContent = '⏳ Getting…'; btn.disabled = true; }

  if (!navigator.geolocation) {
    showManualEntry('Automatic GPS is not available in this browser. Enter coordinates manually below.');
    if (btn) { btn.textContent = '📍 Try Auto'; btn.disabled = false; }
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      S.fd.location = {
        lat: pos.coords.latitude.toFixed(6),
        lng: pos.coords.longitude.toFixed(6),
        acc: Math.round(pos.coords.accuracy)
      };
      applyLocation(S.fd.location);
      if (btn) { btn.textContent = '📍 Update'; btn.disabled = false; }
    },
    e => {
      if (btn) { btn.textContent = '📍 Try Auto'; btn.disabled = false; }
      // Automatic GPS blocked (common when opening file:// in browser)
      const hint = e.code === 3
        ? 'GPS timed out — try again outdoors, or enter coordinates manually.'
        : 'Automatic GPS is blocked when opening the file directly. Enter coordinates manually using Google Maps (see link below).';
      showManualEntry(hint);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function showManualEntry(hint) {
  const box = document.getElementById('gpsManual');
  const msg = document.getElementById('gpsHint');
  if (msg) msg.textContent = hint;
  if (box) box.style.display = 'block';
}

function applyLocation(loc) {
  S.fd.location = loc;
  const chip = document.getElementById('gpsChip');
  if (chip) chip.textContent = `${loc.lat}, ${loc.lng}${loc.acc ? ` (±${loc.acc}m)` : ''}`;
  const box = document.getElementById('gpsManual');
  if (box) box.style.display = 'none';
}

function fillDesc(select) {
  if (!select.value) return;
  const ta = document.getElementById('f_desc');
  if (ta) ta.value = select.value;
  // Reset picker back to placeholder without triggering another change
  select.selectedIndex = 0;
}

function saveManualCoords() {
  const latEl = document.getElementById('manualLat');
  const lngEl = document.getElementById('manualLng');
  const lat = parseFloat(latEl?.value);
  const lng = parseFloat(lngEl?.value);
  if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    alert('Enter valid coordinates. Latitude: -90 to 90. Longitude: -180 to 180.');
    return;
  }
  applyLocation({ lat: lat.toFixed(6), lng: lng.toFixed(6), acc: null });
}

// ── SNAPSHOT FORM FIELDS ───────────────────────────────────────────────────────
function snap() {
  ['f_title','f_desc','f_building','f_floor','f_room','f_rect_comment'].forEach(id => {
    const el = document.getElementById(id);
    if (el) S.fd[id] = el.value;
  });
}

// Collect unique values for a field across all snags in the current project
function fieldOptions(field) {
  const seen = new Set();
  db.snags
    .filter(s => s.projectId === S.projectId && s[field])
    .forEach(s => seen.add(s[field].trim()));
  return [...seen].sort((a, b) => a.localeCompare(b));
}

function datalist(id, field) {
  const opts = fieldOptions(field).map(v => `<option value="${esc(v)}">`).join('');
  return `<datalist id="${id}">${opts}</datalist>`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const views = {
    projects:            viewProjects,
    'snag-list':         viewSnagList,
    'snag-detail':       viewSnagDetail,
    'snag-form':         viewSnagForm,
    'contractor-respond':viewContractorRespond,
    companies:           viewCompanies,
  };
  document.getElementById('app').innerHTML = (views[S.view] || viewProjects)();
}

// ══ VIEWS ══════════════════════════════════════════════════════════════════════

// ── PROJECTS ───────────────────────────────────────────────────────────────────
function viewProjects() {
  const items = db.projects.length
    ? db.projects.map(p => `
        <div class="list-item" onclick="selectProject('${p.id}')">
          <div class="proj-icon">🏗</div>
          <div><div class="proj-name">${esc(p.name)}</div>
               <div class="proj-count">${snagCount(p.id)} snag${snagCount(p.id)!==1?'s':''}</div></div>
          ${p.id === S.projectId ? '<span class="active-chip">ACTIVE</span>' : ''}
        </div>`).join('')
    : `<div class="empty"><div class="eico">📂</div><p>No projects yet.<br>Create one below.</p></div>`;

  return appBar('SiteSnag', '') + `
    <div class="main">
      <div class="mode-strip">
        <button class="mode-btn ${S.mode==='inspector'?'active':''}" onclick="setMode('inspector')">🔍 Inspector</button>
        <button class="mode-btn ${S.mode==='contractor'?'active':''}" onclick="setMode('contractor')">🔧 Contractor</button>
      </div>
      ${S.mode==='contractor' ? `<div class="alert alert-info">Contractor mode: select a project to view your assigned snags.</div>` : ''}
      <div class="sec-label">Projects</div>
      <div class="card">${items}</div>
      <div class="sec-label">New Project</div>
      <div class="card card-body">
        <div class="form-group">
          <label class="form-label">Project Name</label>
          <input type="text" id="newProjName" placeholder="e.g. Block A – Ground Floor" />
        </div>
        <div style="margin-top:.75rem">
          <button class="btn btn-primary btn-block" onclick="createProject()">+ Create Project</button>
        </div>
      </div>
    </div>` + navBar('projects');
}

// ── SNAG LIST ──────────────────────────────────────────────────────────────────
function viewSnagList() {
  const p = proj();
  if (!p) return viewProjects();

  let snags = db.snags.filter(s => s.projectId === S.projectId);

  if (S.mode === 'contractor') {
    if (!S.contractorCompanyId) {
      return appBar(esc(p.name), 'projects', 'Inspector on this project') + `
        <div class="main">
          <div class="sec-label">Select Your Company</div>
          <div class="card card-body">
            ${!db.companies.length
              ? `<div class="alert alert-warn">No companies added. Go to Companies tab first.</div>`
              : `<div class="form-group">
                   <label class="form-label">Your Company</label>
                   <select id="coSelect">
                     <option value="">— choose —</option>
                     ${db.companies.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
                   </select>
                 </div>
                 <div style="margin-top:.75rem">
                   <button class="btn btn-primary btn-block" onclick="pickContractorCo()">Continue</button>
                 </div>`}
          </div>
        </div>` + navBar('snag-list');
    }
    snags = snags.filter(s => s.assignedTo === S.contractorCompanyId && (s.status==='assigned'||s.status==='rejected'));
  }

  const filters = S.mode === 'inspector'
    ? ['all','open','assigned','pending','accepted','rejected']
    : ['all','assigned','rejected'];

  if (S.filter !== 'all') snags = snags.filter(s => s.status === S.filter);
  snags = snags.slice().sort((a,b) => b.createdAt - a.createdAt);

  const chips = filters.map(f => `
    <button class="filter-chip ${S.filter===f?'active':''}" onclick="setFilter('${f}')">
      ${f==='all' ? 'All' : STATUSES[f]?.label || f}
    </button>`).join('');

  const items = snags.length
    ? snags.map(s => `
        <div class="list-item" onclick="go('snag-detail',{snagId:'${s.id}'})">
          <div class="snag-num">${numStr(s.number)}</div>
          <div class="snag-info">
            <div class="snag-title">${esc(s.title)}</div>
            <div class="snag-meta">
              ${badge(s.status)}
              ${s.building||s.floor||s.room ? `<span class="snag-co">
                ${[s.building?`Bldg ${s.building}`:'', s.floor?`Fl ${s.floor}`:'', s.room?`Rm ${s.room}`:''].filter(Boolean).join(' · ')}
              </span>` : ''}
              <span class="snag-co">${esc(coName(s.assignedTo))}</span>
            </div>
          </div>
          ${s.photo
            ? `<img class="snag-thumb" src="${s.photo}" />`
            : `<div class="snag-thumb-empty">📷</div>`}
        </div>`).join('')
    : `<div class="empty"><div class="eico">✅</div><p>No snags${S.filter!=='all'?' with this filter':''}.</p></div>`;

  return appBar(esc(p.name), 'projects') + `
    <div class="main">
      ${S.mode==='contractor' ? `<div class="alert alert-info">Showing snags assigned to <strong>${esc(coName(S.contractorCompanyId))}</strong>
        &nbsp;<button style="font-size:.78rem;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:700" onclick="S.contractorCompanyId=null;render()">Change</button></div>` : ''}
      <div class="filter-row">${chips}</div>
      <div class="card">${items}</div>
    </div>
    ${S.mode==='inspector' ? `<button class="fab" onclick="go('snag-form',{snagId:null,fd:{}})">+</button>` : ''}
    ` + navBar('snag-list');
}

// ── SNAG DETAIL ────────────────────────────────────────────────────────────────
function viewSnagDetail() {
  const snag = db.snags.find(s => s.id === S.snagId);
  if (!snag) return viewSnagList();
  const p   = db.projects.find(p => p.id === snag.projectId);
  const co  = snag.assignedTo ? db.companies.find(c => c.id === snag.assignedTo) : null;
  const ins = S.mode === 'inspector';

  // Inspector actions
  let actionBar = '';
  if (ins) {
    if (snag.status === 'open') {
      actionBar = `<div class="action-bar">
        <button class="btn btn-primary" onclick="openAssignModal('${snag.id}')">Assign to Contractor →</button>
        <button class="btn btn-outline btn-sm" onclick="go('snag-form',{snagId:'${snag.id}',fd:{}})">Edit</button>
      </div>`;
    } else if (snag.status === 'assigned' || snag.status === 'rejected') {
      actionBar = `<div class="action-bar">
        <button class="btn btn-outline" onclick="openAssignModal('${snag.id}')">Reassign</button>
        <button class="btn btn-outline" onclick="go('snag-form',{snagId:'${snag.id}',fd:{}})">Edit</button>
      </div>`;
    } else if (snag.status === 'pending') {
      actionBar = `<div class="action-bar">
        <button class="btn btn-success" onclick="acceptSnag('${snag.id}')">✓ Accept</button>
        <button class="btn btn-danger"  onclick="openRejectModal('${snag.id}')">✗ Reject</button>
      </div>`;
    }
  } else {
    if (snag.assignedTo === S.contractorCompanyId && (snag.status==='assigned'||snag.status==='rejected')) {
      actionBar = `<div class="action-bar">
        <button class="btn btn-primary btn-block" onclick="go('contractor-respond',{snagId:'${snag.id}',fd:{}})">
          📸 Submit Rectification
        </button>
      </div>`;
    }
  }

  // Rectification block
  const r = snag.rectification;
  const rectBlock = r ? `
    <div class="divider"></div>
    <div style="padding:1rem">
      <div class="sec-label" style="margin:0 0 .6rem">Rectification Submitted</div>
      ${r.photo ? `<img src="${r.photo}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:.7rem;display:block" />` : ''}
      <div class="detail-row"><span class="detail-label">By</span>
        <span class="detail-val">${esc(coName(snag.assignedTo))}</span></div>
      <div class="detail-row"><span class="detail-label">Submitted</span>
        <span class="detail-val">${fmtDateTime(r.submittedAt)}</span></div>
      <div class="detail-row"><span class="detail-label">Comment</span>
        <span class="detail-val" style="white-space:pre-wrap">${esc(r.comment)||'—'}</span></div>
    </div>` : '';

  // History
  const hist = (snag.history||[]).map(h => {
    const dc = h.action.includes('Accept')?'g':h.action.includes('Reject')?'r':h.action.includes('Rectif')?'p':'b';
    return `<div class="tl-row">
      <div class="tl-dot ${dc}"></div>
      <div><div class="tl-main">${esc(h.action)}</div>
           <div class="tl-when">${fmtDateTime(h.at)}</div>
           ${h.note?`<div class="tl-note">${esc(h.note)}</div>`:''}</div>
    </div>`;
  }).join('');

  const statusAlert = {
    pending:  `<div class="alert alert-info">Awaiting inspector review.</div>`,
    accepted: `<div class="alert alert-success">Snag closed — accepted by inspector.</div>`,
    rejected: `<div class="alert alert-danger">Rejected — rectification required again.</div>`,
  }[snag.status] || '';

  return appBar(`${numStr(snag.number)} ${esc(snag.title)}`, 'snag-list') + `
    <div class="main">
      ${statusAlert}
      <div class="card">
        ${snag.photo ? `<img class="detail-photo" src="${snag.photo}" />` : ''}
        <div class="card-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem">
            ${badge(snag.status)}
            <span style="font-size:.75rem;color:var(--muted)">${fmtDate(snag.createdAt)}</span>
          </div>
          <div class="detail-row"><span class="detail-label">Project</span>
            <span class="detail-val">${esc(p?.name)}</span></div>
          <div class="detail-row"><span class="detail-label">Location</span>
            <span class="detail-val" style="display:flex;gap:.5rem;flex-wrap:wrap">
              ${snag.building ? `<span style="background:var(--blue-bg);color:var(--blue);font-size:.78rem;font-weight:700;padding:.18rem .6rem;border-radius:999px">🏢 Bldg ${esc(snag.building)}</span>` : ''}
              ${snag.floor    ? `<span style="background:var(--bg);color:var(--soft);font-size:.78rem;font-weight:700;padding:.18rem .6rem;border-radius:999px;border:1.5px solid var(--border)">Floor ${esc(snag.floor)}</span>` : ''}
              ${snag.room     ? `<span style="background:var(--bg);color:var(--soft);font-size:.78rem;font-weight:700;padding:.18rem .6rem;border-radius:999px;border:1.5px solid var(--border)">Room ${esc(snag.room)}</span>` : ''}
              ${!snag.building && !snag.floor && !snag.room ? '<em style="color:var(--muted)">Not specified</em>' : ''}
            </span>
          </div>
          <div class="detail-row"><span class="detail-label">Assigned to</span>
            <span class="detail-val">${co ? esc(co.name) : '<em style="color:var(--muted)">Unassigned</em>'}</span></div>
          <div class="detail-row"><span class="detail-label">Description</span>
            <span class="detail-val" style="white-space:pre-wrap">${esc(snag.description)||'—'}</span></div>
          <div class="detail-row"><span class="detail-label">Location</span>
            <span class="detail-val">${snag.location
              ? `<a class="map-link" href="https://maps.google.com/?q=${snag.location.lat},${snag.location.lng}" target="_blank">📍 ${snag.location.lat}, ${snag.location.lng}</a>
                 <br><span style="font-size:.72rem;color:var(--muted)">±${snag.location.acc}m accuracy</span>`
              : '<em style="color:var(--muted)">Not recorded</em>'}</span></div>
        </div>
        ${rectBlock}
        ${hist ? `<div class="divider"></div>
          <div style="padding:1rem">
            <div class="sec-label" style="margin:0 0 .6rem">History</div>
            <div class="timeline">${hist}</div>
          </div>` : ''}
        ${actionBar}
      </div>
      ${ins ? `<div style="margin-top:.75rem;text-align:center">
        <button onclick="deleteSnag('${snag.id}')"
          style="font-size:.78rem;color:var(--red);background:none;border:none;cursor:pointer;text-decoration:underline">
          Delete snag
        </button>
      </div>` : ''}
    </div>` + navBar('');
}

          </div>
          <div class="form-group">
            <label class="form-label">Floor</label>
            ${floorDL}
            <input type="text" id="f_floor" list="dl_floor" placeholder="e.g. G, 1, 2"
                   value="${esc(S.fd.f_floor ?? editing?.floor ?? '')}" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label">Room</label>
            ${roomDL}
            <input type="text" id="f_room" list="dl_room" placeholder="e.g. 101"
                   value="${esc(S.fd.f_room ?? editing?.room ?? '')}" autocomplete="off" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          ${descPicker}
          <textarea id="f_desc" placeholder="Describe the defect in detail…">${esc(S.fd.f_desc ?? editing?.description ?? '')}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Photo</label>
          ${photo
            ? `<div class="photo-wrap">
                 <img src="${photo}" />
                 <button class="photo-remove" onclick="snap();S.fd.photo=null;render()">×</button>
               </div>`
            : `<label class="photo-trigger" for="photoIn">📷 Take / Choose Photo</label>
               <input type="file" id="photoIn" accept="image/*" capture="environment" style="display:none"
                      onchange="handlePhoto(this)" />`}

        <div class="form-group">
          <label class="form-label">GPS Location <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>

              </div>

                <div style="font-size:.72rem;font-weight:700;color:var(--soft);margin-bottom:.25rem">LONGITUDE</div>

// ── CHROME ─────────────────────────────────────────────────────────────────────
function appBar(title, backView, sub) {
  const back = backView ? `<button class="back-btn" onclick="go('${backView}')">&#8592;</button>` : '';
  return `<div class="app-bar">${back}<h1>${title}${sub?`<small>${sub}</small>`:''}</h1></div>`;
}

function navBar(active) {
  // If no project selected but one exists, auto-select the first
  const snagClick = S.projectId
    ? "go('snag-list')"
    : db.projects.length === 1
      ? `selectProject('${db.projects[0].id}')`
      : "go('projects')";
  return `<nav class="bottom-nav">
    <button class="nav-btn ${active==='projects'?'active':''}" onclick="go('projects')">
      <span class="ico">📂</span>Projects
    </button>
    <button class="nav-btn ${active==='snag-list'?'active':''}"
            onclick="${snagClick}">
      <span class="ico">📋</span>Snags
    </button>
    <button class="nav-btn ${active==='companies'?'active':''}" onclick="go('companies')">
      <span class="ico">🏢</span>Companies
    </button>
  </nav>`;
}

// ── MODALS ─────────────────────────────────────────────────────────────────────
function openAssignModal(snagId) {
  if (!db.companies.length) { alert('Add companies first (Companies tab).'); return; }
  const snag = db.snags.find(s => s.id === snagId);
  const opts = db.companies.map(c =>
    `<option value="${c.id}" ${c.id===snag.assignedTo?'selected':''}>${esc(c.name)}</option>`).join('');
  modal(`<div class="modal-title">Assign to Contractor</div>
    <div class="form-group">
      <label class="form-label">Company</label>
      <select id="m_co">${opts}</select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAssign('${snagId}')">Assign →</button>
    </div>`);
}

function openRejectModal(snagId) {
  modal(`<div class="modal-title" style="color:var(--red)">Reject Rectification</div>
    <div class="form-group">
      <label class="form-label">Reason</label>
      <textarea id="m_note" placeholder="Why is this not acceptable?" style="min-height:80px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doReject('${snagId}')">✗ Reject</button>
    </div>`);
}

function modal(html) {
  closeModal();
  document.body.insertAdjacentHTML('beforeend',
    `<div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
       <div class="modal-box">${html}</div>
     </div>`);
}
function closeModal() { document.getElementById('modalBack')?.remove(); }

// ── ACTIONS ────────────────────────────────────────────────────────────────────
function setMode(m) { S.mode = m; S.contractorCompanyId = null; S.filter = 'all'; go('projects'); }
function setFilter(f) { S.filter = f; render(); }

function selectProject(id) { S.projectId = id; S.filter = 'all'; S.contractorCompanyId = null; go('snag-list'); }

function createProject() {
  const n = document.getElementById('newProjName').value.trim();
  if (!n) { alert('Enter a project name.'); return; }
  const p = { id: uid(), name: n, createdAt: Date.now() };
  db.projects.push(p);
  saveDB();
  S.projectId = p.id;
  go('snag-list');
}

function addCo() {
  const n = document.getElementById('newCoName').value.trim();
  if (!n) { alert('Enter a company name.'); return; }
  if (db.companies.some(c => c.name.toLowerCase() === n.toLowerCase())) { alert('Company already exists.'); return; }
  db.companies.push({ id: uid(), name: n });
  saveDB();
  render();
}

function deleteCo(id) {
  if (!confirm('Remove this company?')) return;
  db.companies = db.companies.filter(c => c.id !== id);
  saveDB();
  render();
}

async function handlePhoto(input) {
  const f = input.files[0];
  if (!f) return;
  snap();
  S.fd.photo = await resizePhoto(f);
  render();
}

async function handleRectPhoto(input) {
  const f = input.files[0];
  if (!f) return;
  snap();
  S.fd.rectPhoto = await resizePhoto(f);
  render();
}

function saveSnag() {
  const titleEl = document.getElementById('f_title');
  const title   = titleEl.value.trim();
  if (!title) { titleEl.focus(); alert('Title is required.'); return; }
  const desc     = document.getElementById('f_desc').value.trim();
  const building = document.getElementById('f_building').value.trim();
  const floor    = document.getElementById('f_floor').value.trim();
  const room     = document.getElementById('f_room').value.trim();

  if (S.snagId) {
    const snag = db.snags.find(s => s.id === S.snagId);
    snag.title = title;
    snag.description = desc;
    snag.building = building;
    snag.floor    = floor;
    snag.room     = room;
    if (S.fd.photo !== undefined) snag.photo = S.fd.photo;
    if (S.fd.location) snag.location = S.fd.location;
    snag.history = snag.history || [];
    snag.history.push({ action: 'Edited', at: Date.now() });
    saveDB();
    S.fd = {};
    go('snag-detail', { snagId: S.snagId });
  } else {
    const snag = {
      id: uid(), projectId: S.projectId, number: nextNum(S.projectId),
      title, description: desc,
      building, floor, room,
      photo: S.fd.photo || null, location: S.fd.location || null,
      status: 'open', assignedTo: null,
      createdAt: Date.now(), rectification: null,
      history: [{ action: 'Created', at: Date.now() }]
    };
    db.snags.push(snag);
    saveDB();
    S.fd = {};
    go('snag-detail', { snagId: snag.id });
  }
}

function deleteSnag(id) {
  if (!confirm('Permanently delete this snag?')) return;
  db.snags = db.snags.filter(s => s.id !== id);
  saveDB();
  go('snag-list');
}

function doAssign(snagId) {
  const cid = document.getElementById('m_co').value;
  if (!cid) return;
  const snag = db.snags.find(s => s.id === snagId);
  snag.assignedTo = cid;
  snag.status = 'assigned';
  snag.history = snag.history || [];
  snag.history.push({ action: `Assigned to ${coName(cid)}`, at: Date.now() });
  saveDB();
  closeModal();
  render();
}

function acceptSnag(snagId) {
  if (!confirm('Accept this rectification and close the snag?')) return;
  const snag = db.snags.find(s => s.id === snagId);
  snag.status = 'accepted';
  snag.history = snag.history || [];
  snag.history.push({ action: 'Accepted ✓ — Snag Closed', at: Date.now() });
  saveDB();
  render();
}

function doReject(snagId) {
  const note = document.getElementById('m_note').value.trim();
  const snag = db.snags.find(s => s.id === snagId);
  snag.status = 'rejected';
  snag.history = snag.history || [];
  snag.history.push({ action: 'Rejected', note, at: Date.now() });
  saveDB();
  closeModal();
  render();
}

function submitRect(snagId) {
  const comment = document.getElementById('f_rect_comment').value.trim();
  const photo   = S.fd.rectPhoto;
  if (!photo) { alert('A photo is required.'); return; }
  const snag = db.snags.find(s => s.id === snagId);
  snag.rectification = { photo, comment, submittedAt: Date.now() };
  snag.status = 'pending';
  snag.history = snag.history || [];
  snag.history.push({ action: 'Rectification submitted', note: comment, at: Date.now() });
  saveDB();
  S.fd = {};
  go('snag-detail', { snagId });
}

function pickContractorCo() {
  const v = document.getElementById('coSelect').value;
  if (!v) { alert('Select your company.'); return; }
  S.contractorCompanyId = v;
  render();
}

// ── INIT ───────────────────────────────────────────────────────────────────────
loadDB();
loadState();
render();
</script>
</body>
</html>
