function saveSnag() {
  const titleEl  = document.getElementById('f_title');
  const title    = titleEl.value.trim();
  if (!title) { titleEl.focus(); alert('Component snagged is required.'); return; }
  if (!isValidComponent(title)) { titleEl.focus(); alert('Component snagged must be 2 words, or 3 words when one uses a hyphen (e.g. "Cracked render" or "Powder-coated panel frame").'); return; }
  const desc        = document.getElementById('f_desc').value.trim();
  const discipline  = document.getElementById('f_discipline').value.trim();
  const subsystem   = document.getElementById('f_subsystem')?.value.trim() || '';
  const assignedTo  = document.getElementById('f_assigned_to')?.value || '';
  const building     = document.getElementById('f_building').value.trim();
  const buildingName = document.getElementById('f_building_name')?.value.trim() || '';
  const floor        = document.getElementById('f_floor').value.trim();
  const room         = document.getElementById('f_room').value.trim();

  if (S.snagId) {
    const snag = db.snags.find(s => s.id === S.snagId);
    snag.title = title; snag.description = desc;
    snag.discipline = discipline; snag.subsystem = subsystem;
    snag.building = building; snag.buildingName = buildingName; snag.floor = floor; snag.room = room;
    if (assignedTo && assignedTo !== snag.assignedTo) {
      snag.assignedTo = assignedTo;
      snag.status = 'assigned';
      snag.history = snag.history || [];
      snag.history.push({ action: `Assigned to ${coName(assignedTo)}`, by: byMe(), at: Date.now() });
    } else if (!assignedTo && snag.assignedTo) {
      snag.assignedTo = null;
      snag.status = 'open';
    }
    if (S.fd.photo !== undefined) snag.photo = S.fd.photo;
    if (S.fd.location) snag.location = S.fd.location;
    snag.history = snag.history || [];
    snag.history.push({ action: 'Edited', by: byMe(), at: Date.now() });
    _autoAddLocation(building, floor, room, buildingName);
    if (discipline && subsystem && !db.subsystems.find(s => s.discipline === discipline && s.name === subsystem))
      db.subsystems.push({ id: uid(), discipline, name: subsystem });
    saveDB(); S.fd = {};
    go('snag-detail', { snagId: S.snagId });
  } else {
    const history = [{ action: 'Created', by: byMe(), at: Date.now() }];
    if (assignedTo) history.push({ action: `Assigned to ${coName(assignedTo)}`, by: byMe(), at: Date.now() });
    const snag = {
      id: uid(), projectId: S.projectId, number: nextSnagId(S.projectId, discipline, subsystem, building),
      title, description: desc, discipline, subsystem, building, buildingName, floor, room,
      photo: S.fd.photo||null, location: S.fd.location||null,
      status: assignedTo ? 'assigned' : 'open', assignedTo: assignedTo || null,
      createdAt: Date.now(), rectification: null,
      history
    };
    db.snags.push(snag);
    _autoAddLocation(building, floor, room, buildingName);
    if (discipline && subsystem && !db.subsystems.find(s => s.discipline === discipline && s.name === subsystem))
      db.subsystems.push({ id: uid(), discipline, name: subsystem });
    saveDB(); S.fd = {};
    go('snag-detail', { snagId: snag.id });
  }
}

function locationSelects(selBuilding, selFloor, selRoom, selBuildingName) {

  const floorObj  = bldgObj?.floors.find(f => f.name === selFloor);
  const floorRooms = floorObj ? floorObj.rooms
    : [...new Set((db.locations||[]).flatMap(b => b.floors.flatMap(f => f.rooms)))].sort();

  return `

      <label class="form-label">Building Name <span style="font-weight:400;color:var(--muted)">(for reference only)</span></label>
      <input type="text" id="f_building_name" list="dl_building_names" placeholder="e.g. Academic City Station"
        value="${esc(autoName)}" autocomplete="off" style="${iStyle}" />

    </div>
    <div class="form-group">
      <label class="form-label">Floor</label>

        value="${esc(selFloor)}" autocomplete="off" style="${iStyle}" />

    </div>
    <div class="form-group">

    </div>`;
}

function _autoAddLocation(building, floor, room, buildingName) {
  if (!building) return;
  if (!db.locations) db.locations = [];
  let b = db.locations.find(x => x.building === building);
  if (!b) { b = { id: uid(), building, buildingName: buildingName||'', floors: [] }; db.locations.push(b); }
  else if (buildingName && !b.buildingName) b.buildingName = buildingName;
  if (!floor) return;
  let f = b.floors.find(x => x.name === floor);
  if (!f) { f = { id: uid(), name: floor, rooms: [] }; b.floors.push(f); }
  if (room && !f.rooms.includes(room)) f.rooms.push(room);
}

function startEditBuilding(bldgId) { S.editingLoc = { type:'building', bldgId }; render(); }
function startEditFloor(bldgId, floorId) { S.editingLoc = { type:'floor', bldgId, floorId }; render(); }
function startEditRoom(bldgId, floorAndRoom) {
  const [floorId, ...rp] = floorAndRoom.split('|');
  S.editingLoc = { type:'room', bldgId, floorId, roomName: rp.join('|') }; render();
}
function cancelEdit() { S.editingLoc = null; render(); }

function saveBuilding(bldgId) {
  const inp = document.getElementById('edit_bldg_' + bldgId);
  const newCode = (inp?.value || '').trim();
  if (!newCode) return;
  const nameInp = document.getElementById('edit_bldg_name_' + bldgId);
  const newBuildingName = (nameInp?.value || '').trim();
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  const oldCode = b.building;
  if (newCode !== oldCode) {
    if (db.locations.find(x => x.id !== bldgId && x.building.toLowerCase() === newCode.toLowerCase())) { alert('Building code already exists.'); return; }
    b.building = newCode;
    db.snags.forEach(s => { if (s.building === oldCode) s.building = newCode; });
  }
  b.buildingName = newBuildingName;
  db.snags.forEach(s => { if (s.building === newCode) s.buildingName = newBuildingName; });
  saveDB(); S.editingLoc = null; render();
}

function saveFloor(bldgId, floorId) {
  const inp = document.getElementById('edit_floor_' + floorId);
  const newName = (inp?.value || '').trim();
  if (!newName) return;
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  const f = b.floors.find(f => f.id === floorId);
  if (!f) return;
  const oldName = f.name;
  if (newName === oldName) { cancelEdit(); return; }
  if (b.floors.find(x => x.id !== floorId && x.name.toLowerCase() === newName.toLowerCase())) { alert('Floor name already exists in this building.'); return; }
  f.name = newName;
  db.snags.forEach(s => { if (s.building === b.building && s.floor === oldName) s.floor = newName; });
  saveDB(); S.editingLoc = null; render();
}

function saveRoom(bldgId, floorAndOldRoom) {
  const [floorId, ...rp] = floorAndOldRoom.split('|');
  const oldRoom = rp.join('|');
  const inp = document.getElementById('edit_room_' + floorId);
  const newRoom = (inp?.value || '').trim();
  if (!newRoom) return;
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  const f = b.floors.find(f => f.id === floorId);
  if (!f) return;
  if (newRoom === oldRoom) { cancelEdit(); return; }
  if (f.rooms.find(r => r.toLowerCase() === newRoom.toLowerCase())) { alert('Room already exists on this floor.'); return; }
  f.rooms = f.rooms.map(r => r === oldRoom ? newRoom : r);
  db.snags.forEach(s => { if (s.building === b.building && s.floor === f.name && s.room === oldRoom) s.room = newRoom; });
  saveDB(); S.editingLoc = null; render();
}

function addBuilding() {
  const inp = document.getElementById('new_building');
  const name = (inp?.value || '').trim();
  if (!name) return;
  if (!db.locations) db.locations = [];
  if (db.locations.find(b => b.building.toLowerCase() === name.toLowerCase())) { alert('Building already exists.'); return; }
  db.locations.push({ id: uid(), building: name, floors: [] });
  saveDB(); render();
}

function addFloor(bldgId) {
  const inp = document.getElementById('new_floor_' + bldgId);
  const name = (inp?.value || '').trim();
  if (!name) return;
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  if (b.floors.find(f => f.name.toLowerCase() === name.toLowerCase())) { alert('Floor already exists.'); return; }
  b.floors.push({ id: uid(), name, rooms: [] });
  saveDB(); render();
}

function addRoom(bldgId, floorId) {
  const inp = document.getElementById('new_room_' + floorId);
  const name = (inp?.value || '').trim();
  if (!name) return;
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  const f = b.floors.find(f => f.id === floorId);
  if (!f) return;
  if (f.rooms.find(r => r.toLowerCase() === name.toLowerCase())) { alert('Room already exists.'); return; }
  f.rooms.push(name);
  saveDB(); render();
}

function deleteBuilding(bldgId) {
  if (!confirm('Delete this building and all its floors and rooms?')) return;
  db.locations = db.locations.filter(b => b.id !== bldgId);
  saveDB(); render();
}

function deleteFloor(bldgId, floorId) {
  if (!confirm('Delete this floor and all its rooms?')) return;
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  b.floors = b.floors.filter(f => f.id !== floorId);
  saveDB(); render();
}

function deleteRoom(bldgId, floorAndRoom) {
  const [floorId, ...roomParts] = floorAndRoom.split('|');
  const roomName = roomParts.join('|');
  const b = db.locations.find(b => b.id === bldgId);
  if (!b) return;
  const f = b.floors.find(f => f.id === floorId);
  if (!f) return;
  f.rooms = f.rooms.filter(r => r !== roomName);
  saveDB(); render();
}

function addSubsystem(discipline) {
  const key = discipline.replace(/\s+/g, '_');
  const inp = document.getElementById('new_sub_' + key);
  const name = (inp?.value || '').trim();
  if (!name) return;
  if (!db.subsystems) db.subsystems = [];
  if (db.subsystems.find(s => s.discipline === discipline && s.name.toLowerCase() === name.toLowerCase())) {
    alert('Subsystem already exists for this discipline.'); return;
  }
  db.subsystems.push({ id: uid(), discipline, name });
  saveDB(); render();
}

function deleteSubsystem(id) {
  if (!confirm('Remove this subsystem?')) return;
  db.subsystems = db.subsystems.filter(s => s.id !== id);
  saveDB(); render();
}

async function handleSplashProjectImage(input) {
  const f = input.files[0]; if (!f) return;
  db.splashConfig.projectImage = await resizePhoto(f);
  saveDB(); render();
}
async function handleSplashLogo(input) {
  const f = input.files[0]; if (!f) return;
  if (!db.splashConfig.logos) db.splashConfig.logos = [];
  if (db.splashConfig.logos.length >= 4) return;
  db.splashConfig.logos.push(await resizePhoto(f));
  saveDB(); render();
}
function removeSplashProjectImage() { db.splashConfig.projectImage = null; saveDB(); render(); }
function removeSplashLogo(idx) { db.splashConfig.logos.splice(Number(idx), 1); saveDB(); render(); }

function exportData() {
  const ts = new Date().toISOString().slice(0,10);
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sitesnag-backup-${ts}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(input) {
  const f = input.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.snags || !imported.projects) { alert('Invalid backup file.'); return; }
      if (!confirm(`This will replace ALL current data with the backup (${imported.snags.length} snags, ${imported.projects.length} projects). Continue?`)) return;
      db = { projects:[], companies:[], snags:[], users:[], locations:[], subsystems:[], ...imported };
      saveDB(); render();
      alert('Data restored successfully.');
    } catch { alert('Could not read backup file — it may be corrupted.'); }
  };
  reader.readAsText(f);
  input.value = '';
}

  if (!splash) return;

  // Populate project phase content
  var projName = (db.projects && db.projects.length)
    ? db.projects[0].name
    : '';
  var cfg = db.splashConfig || {};

  var nameEl  = document.getElementById('splash-proj-name');
  var imgWrap = document.getElementById('splash-img-wrap');
  var imgEl   = document.getElementById('splash-proj-img');
  var logosEl = document.getElementById('splash-logos');

  if (nameEl) nameEl.textContent = projName;
  if (imgEl && cfg.projectImage) {
    imgEl.src = cfg.projectImage;
    if (imgWrap) imgWrap.style.display = 'block';
  }
  if (logosEl && cfg.logos && cfg.logos.length) {
    logosEl.innerHTML = cfg.logos.map(function(src) {
      return '<img src="' + src + '" style="height:48px;object-fit:contain;background:#fff;border-radius:6px;padding:3px;border:1.5px solid rgba(255,215,0,.3)" />';
    }).join('');
  }

  var appNameEl   = document.getElementById('splash-app-name');
  var projEl      = document.getElementById('splash-project');
  var dismissed   = false;

  function hideSplash() {
    if (dismissed) return;
    dismissed = true;
    splash.style.transition = 'opacity .6s ease';
    splash.style.opacity = '0';
    setTimeout(function() { splash.style.display = 'none'; }, 650);
  }

  // Phase 1: fade in app name (0 → 0.9s)
  setTimeout(function() { if (appNameEl) appNameEl.style.opacity = '1'; }, 80);

  // Phase 2: fade out app name (2.4s → 3.3s)
  setTimeout(function() { if (appNameEl) appNameEl.style.opacity = '0'; }, 2400);

  // Phase 3: fade in project content (3.4s)
  setTimeout(function() { if (projEl) projEl.style.opacity = '1'; }, 3400);

  // Phase 4: auto-dismiss (6s)
  setTimeout(hideSplash, 6000);
})();

function dismissSplash() {
  var splash = document.getElementById('splash');
  if (!splash || splash.style.display === 'none') return;
  splash.style.transition = 'opacity .4s ease';
  splash.style.opacity = '0';
  setTimeout(function() { splash.style.display = 'none'; }, 420);
}
</script>
</body>
</html>
