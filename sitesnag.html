<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SiteSnag — Construction Inspection</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #1d4ed8;
      --blue-bg:     #dbeafe;
      --orange:      #ea580c;
      --orange-bg:   #ffedd5;
      --green:       #15803d;
      --green-bg:    #dcfce7;
      --red:         #dc2626;
      --red-bg:      #fee2e2;
      --purple:      #7c3aed;
      --purple-bg:   #ede9fe;
      --amber:       #b45309;
      --amber-bg:    #fef3c7;
      --bg:          #f1f5f9;
      --card:        #ffffff;
      --text:        #0f172a;
      --soft:        #475569;
      --muted:       #94a3b8;
      --border:      #e2e8f0;
      --radius:      14px;
      --shadow:      0 1px 4px rgba(0,0,0,.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 76px;
      font-size: 15px;
    }

    /* ── App header ── */
    .app-bar {
      background: var(--blue);
      color: #fff;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      position: sticky;
      top: 0;
      z-index: 90;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .app-bar h1 { font-size: 1.05rem; font-weight: 700; flex: 1; line-height: 1.2; }
    .app-bar h1 small { display: block; font-size: .72rem; font-weight: 400; opacity: .7; }
    .back-btn {
      background: none; border: none; color: rgba(255,255,255,.85);
      font-size: 1.4rem; cursor: pointer; padding: 0 .2rem; line-height: 1;
    }
    .back-btn:hover { color: #fff; }
    .user-chip {
      display: flex; align-items: center; gap: .35rem;
      background: rgba(255,255,255,.18); border-radius: 999px;
      padding: .28rem .65rem .28rem .45rem;
      font-size: .78rem; font-weight: 700; cursor: default;
      max-width: 160px;
    }
    .user-chip .avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 800; flex-shrink: 0;
    }
    .user-chip .uname {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .logout-btn {
      background: rgba(255,255,255,.18); border: none; color: #fff;
      border-radius: 8px; padding: .3rem .55rem; font-size: .78rem;
      font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .logout-btn:hover { background: rgba(255,255,255,.3); }

    /* ── Login screen ── */
    .login-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1rem 3rem; background: var(--bg);
    }
    .login-logo { font-size: 2.8rem; margin-bottom: .4rem; }
    .login-title { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: .25rem; }
    .login-sub { font-size: .88rem; color: var(--muted); margin-bottom: 2rem; }
    .user-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .6rem; width: 100%; max-width: 480px; margin-bottom: 1.2rem;
    }
    .user-card {
      background: #fff; border-radius: var(--radius);
      padding: .9rem .8rem; text-align: center; cursor: pointer;
      border: 2.5px solid transparent;
      box-shadow: var(--shadow); transition: all .15s;
    }
    .user-card:hover { border-color: var(--blue); }
    .user-card.selected { border-color: var(--blue); background: var(--blue-bg); }
    .user-card .uc-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      margin: 0 auto .5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; color: #fff;
    }
    .user-card .uc-name { font-weight: 700; font-size: .9rem; margin-bottom: .25rem; }
    .user-card .uc-role {
      font-size: .68rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted);
    }
    .pin-wrap {
      width: 100%; max-width: 480px;
      background: #fff; border-radius: var(--radius);
      padding: 1.2rem; box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .pin-label { font-size: .78rem; font-weight: 800; color: var(--soft); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .5rem; }
    .pin-dots {
      display: flex; gap: .5rem; justify-content: center;
      margin-bottom: .9rem;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      transition: background .12s, border-color .12s;
    }
    .pin-dot.filled { background: var(--blue); border-color: var(--blue); }
    .pin-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem;
    }
    .pin-key {
      padding: .75rem; border: none; border-radius: 10px;
      background: var(--bg); font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: background .1s; font-family: inherit;
      color: var(--text);
    }
    .pin-key:active { background: var(--blue-bg); }
    .pin-key.del { color: var(--red); font-size: 1rem; }
    .pin-key.go  { background: var(--blue); color: #fff; }
    .pin-key.go:active { background: var(--blue); filter: brightness(1.1); }
    .pin-error { color: var(--red); font-size: .82rem; font-weight: 600; text-align: center; margin-top: .5rem; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      display: flex; z-index: 90;
      box-shadow: 0 -2px 12px rgba(0,0,0,.07);
    }
    .nav-btn {
      flex: 1; border: none; background: none;
      padding: .6rem .3rem .45rem;
      display: flex; flex-direction: column; align-items: center; gap: .18rem;
      cursor: pointer; color: var(--muted);
      font-size: .62rem; font-weight: 700; letter-spacing: .02em;
      transition: color .12s; font-family: inherit;
    }
    .nav-btn .ico { font-size: 1.3rem; line-height: 1; }
    .nav-btn.active { color: var(--blue); }

    /* ── Main ── */
    .main { padding: .85rem; max-width: 580px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .card + .card { margin-top: .75rem; }
    .card-body { padding: 1rem; }

    /* ── List items ── */
    .list-item {
      display: flex; align-items: center;
      padding: .82rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; gap: .8rem; transition: background .1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #f8fafc; }
    .list-item:active { background: var(--blue-bg); }

    /* ── Snag list ── */
    .snag-num {
      background: var(--blue); color: #fff;
      font-size: .75rem; font-weight: 800;
      border-radius: 7px; padding: .22rem .48rem;
      min-width: 48px; text-align: center; flex-shrink: 0;
    }
    .snag-info { flex: 1; min-width: 0; }
    .snag-title {
      font-weight: 600; font-size: .93rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .snag-meta { display: flex; align-items: center; gap: .45rem; margin-top: .2rem; flex-wrap: wrap; }
    .snag-co { font-size: .73rem; color: var(--soft); }
    .snag-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .snag-thumb-empty {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--bg); border: 1.5px dashed var(--border);
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; color: var(--muted); font-size: .95rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: .18rem .55rem; border-radius: 999px;
      font-size: .7rem; font-weight: 800; letter-spacing: .03em; white-space: nowrap;
    }
    .b-open     { background: var(--amber-bg);  color: var(--amber); }
    .b-assigned { background: var(--blue-bg);   color: var(--blue); }
    .b-pending  { background: var(--purple-bg); color: var(--purple); }
    .b-accepted { background: var(--green-bg);  color: var(--green); }
    .b-rejected { background: var(--red-bg);    color: var(--red); }
    .role-badge {
      display: inline-flex; align-items: center;
      padding: .15rem .5rem; border-radius: 999px;
      font-size: .68rem; font-weight: 800; letter-spacing: .05em; white-space: nowrap;
    }
    .role-engineer    { background: var(--blue-bg);   color: var(--blue); }
    .role-administrator { background: var(--purple-bg); color: var(--purple); }
    .role-contractor  { background: var(--orange-bg); color: var(--orange); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: .4rem; padding: .62rem 1.25rem; border: none;
      border-radius: 999px; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: filter .15s, transform .1s;
      font-family: inherit; white-space: nowrap;
    }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-danger  { background: var(--red);   color: #fff; }
    .btn-outline { background: none; border: 2px solid var(--border); color: var(--soft); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm { padding: .38rem .85rem; font-size: .82rem; }
    .btn-block { width: 100%; border-radius: var(--radius); }

    .fab {
      position: fixed; bottom: 86px; right: 1.1rem;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--blue); color: #fff; border: none;
      font-size: 1.7rem; cursor: pointer; box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
      z-index: 80; transition: transform .15s;
    }
    .fab:hover { transform: scale(1.07); }
    .fab:active { transform: scale(.9); }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: .38rem; }
    .form-group + .form-group { margin-top: .85rem; }
    .form-label {
      font-size: .73rem; font-weight: 800; color: var(--soft);
      text-transform: uppercase; letter-spacing: .07em;
    }
    input[type=text], input[type=date], input[type=password], textarea, select {
      width: 100%; padding: .62rem .9rem;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: .93rem; font-family: inherit; color: var(--text);
      background: #fff; outline: none; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 88px; }

    .photo-trigger {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .75rem; border: 2px dashed var(--border); border-radius: 10px;
      cursor: pointer; background: var(--bg); color: var(--soft);
      font-size: .9rem; font-weight: 600; transition: all .15s;
    }
    .photo-trigger:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
    .photo-wrap { position: relative; border-radius: 10px; overflow: hidden; }
    .photo-wrap img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
    .photo-remove {
      position: absolute; top: .45rem; right: .45rem;
      background: rgba(0,0,0,.55); color: #fff; border: none;
      border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .95rem;
    }

    .loc-row { display: flex; gap: .5rem; align-items: center; }
    .loc-chip {
      flex: 1; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: .5rem .75rem;
      font-size: .8rem; color: var(--soft); font-family: monospace;
    }

    /* ── Detail view ── */
    .detail-photo { width: 100%; max-height: 260px; object-fit: cover; display: block; }
    .detail-row {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .6rem 0; border-bottom: 1px solid var(--border); font-size: .9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      color: var(--muted); font-size: .73rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em;
      min-width: 88px; flex-shrink: 0; padding-top: .05rem;
    }
    .detail-val { flex: 1; }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: .65rem; }
    .tl-row { display: flex; gap: .65rem; align-items: flex-start; }
    .tl-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      margin-top: .35rem; background: var(--muted);
    }
    .tl-dot.g { background: var(--green); }
    .tl-dot.r { background: var(--red); }
    .tl-dot.b { background: var(--blue); }
    .tl-dot.p { background: var(--purple); }
    .tl-main { font-size: .87rem; font-weight: 600; }
    .tl-when { font-size: .73rem; color: var(--muted); }
    .tl-by   { font-size: .75rem; color: var(--blue); font-weight: 600; margin-top: .1rem; }
    .tl-note { font-size: .8rem; color: var(--soft); margin-top: .1rem; white-space: pre-wrap; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: .5rem; padding: 1rem;
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .action-bar .btn { flex: 1; min-width: 110px; }

    /* ── Alerts ── */
    .alert {
      padding: .7rem 1rem; border-radius: 10px;
      font-size: .87rem; font-weight: 600; margin-bottom: .75rem;
    }
    .alert-info    { background: var(--blue-bg);   color: #1e3a8a; }
    .alert-success { background: var(--green-bg);  color: #14532d; }
    .alert-warn    { background: var(--amber-bg);  color: #78350f; }
    .alert-danger  { background: var(--red-bg);    color: #7f1d1d; }

    /* ── Project list ── */
    .proj-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; flex-shrink: 0;
    }
    .proj-name { font-weight: 700; font-size: .95rem; }
    .proj-count { font-size: .75rem; color: var(--muted); }
    .active-chip {
      margin-left: auto; background: var(--blue); color: #fff;
      font-size: .65rem; font-weight: 800; padding: .14rem .5rem;
      border-radius: 999px; letter-spacing: .04em;
    }

    /* ── Company / User list ── */
    .co-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .usr-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .co-name { flex: 1; font-weight: 600; }
    .del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.1rem; padding: .2rem .35rem;
      transition: color .15s;
    }
    .del-btn:hover { color: var(--red); }

    /* ── Filters ── */
    .filter-row {
      display: flex; gap: .3rem; overflow-x: auto; margin-bottom: .75rem;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: .35rem .8rem; border-radius: 999px;
      font-size: .76rem; font-weight: 700; border: 2px solid var(--border);
      background: #fff; color: var(--soft); cursor: pointer;
      transition: all .12s; font-family: inherit;
    }
    .filter-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── Misc ── */
    .sec-label {
      font-size: .69rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .11em; color: var(--muted); margin: 1.1rem 0 .45rem;
    }
    .empty { text-align: center; padding: 2.8rem 1rem; color: var(--muted); }
    .empty .eico { font-size: 2.2rem; margin-bottom: .4rem; }
    .empty p { font-size: .88rem; }
    .map-link {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .82rem; color: var(--blue); font-weight: 600; text-decoration: none;
    }
    .divider { height: 1px; background: var(--border); }

    /* ── Reports / Analytics ── */
    .rpt-kpi-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-bottom: .75rem;
    }
    @media (max-width: 360px) { .rpt-kpi-grid { grid-template-columns: repeat(2,1fr); } }
    .rpt-kpi {
      background: var(--card); border-radius: var(--radius);
      padding: .8rem .85rem; box-shadow: var(--shadow);
    }
    .rpt-kpi-val { font-size: 1.55rem; font-weight: 800; line-height: 1; margin-bottom: .2rem; }
    .rpt-kpi-label { font-size: .63rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .rpt-kpi-sub { font-size: .7rem; color: var(--soft); margin-top: .15rem; }
    .bar-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .32rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-track { flex: 1; height: 13px; background: var(--bg); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; }
    .bar-label { font-size: .76rem; font-weight: 600; min-width: 84px; color: var(--soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-count { font-size: .76rem; font-weight: 800; min-width: 28px; text-align: right; }
    .rpt-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .rpt-table th {
      text-align: left; font-size: .63rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); padding: .5rem .65rem;
      border-bottom: 2px solid var(--border); white-space: nowrap;
    }
    .rpt-table td { padding: .52rem .65rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .rpt-table tr:last-child td { border-bottom: none; }
    .heat-cell { padding: .38rem .45rem; border-radius: 5px; text-align: center; font-size: .78rem; font-weight: 700; }
    .proj-sel-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
    .proj-sel-row label { font-size: .72rem; font-weight: 800; color: var(--soft); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }

    /* ── Modal ── */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: #fff; border-radius: 18px 18px 0 0;
      padding: 1.4rem 1.1rem 1.6rem;
      width: 100%; max-width: 500px;
      box-shadow: 0 -4px 32px rgba(0,0,0,.15);
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: .55rem; margin-top: 1rem; }
    .modal-actions .btn { flex: 1; }
  </style>
</head>
<body>

<!-- ── SPLASH SCREEN ─────────────────────────────────────────────────────────── -->
<div id="splash" style="position:fixed;inset:0;z-index:99999;background:#002366;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer" onclick="dismissSplash()">
  <div id="splash-app-name" style="opacity:0;transition:opacity .9s ease;text-align:center">
    <div style="font-size:2.6rem;font-weight:900;color:#FFD700;letter-spacing:.08em;font-family:inherit">SiteSnag</div>
    <div style="font-size:.85rem;color:rgba(255,215,0,.65);letter-spacing:.18em;text-transform:uppercase;margin-top:.35rem">Construction Quality Inspection</div>
  </div>
  <div id="splash-project" style="opacity:0;transition:opacity .9s ease;text-align:center;padding:0 2rem;max-width:420px;width:100%;position:absolute">
    <div id="splash-logos" style="display:flex;justify-content:center;gap:1.2rem;margin-bottom:1.1rem;flex-wrap:wrap"></div>
    <div id="splash-img-wrap" style="margin-bottom:1rem;display:none">
      <img id="splash-proj-img" style="max-width:100%;max-height:160px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,215,0,.35)" />
    </div>
    <div id="splash-proj-name" style="font-size:1.4rem;font-weight:800;color:#FFD700;letter-spacing:.04em"></div>

async function _sha256Hex(data) {
  const buf = await crypto.subtle.digest('SHA-256', typeof data === 'string' ? new TextEncoder().encode(data) : data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function _hmacSha256(keyData, message) {
  const k = await crypto.subtle.importKey('raw',
    typeof keyData === 'string' ? new TextEncoder().encode(keyData) : keyData,
    { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  return crypto.subtle.sign('HMAC', k, typeof message === 'string' ? new TextEncoder().encode(message) : message);
}
async function _hmacSha256Hex(keyData, message) {
  return Array.from(new Uint8Array(await _hmacSha256(keyData, message))).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function uploadPhotoToR2(dataUrl, path) {
  if (!R2_PUBLIC_URL) return null; // R2 not yet configured with public URL
  try {
    const blob = await (await fetch(dataUrl)).blob();
    const contentType = 'image/jpeg';
    const now = new Date();
    const dateStamp = now.toISOString().slice(0,10).replace(/-/g,'');
    const amzDate   = now.toISOString().replace(/[:-]|\.\d{3}/g,'');
    const payloadHash = await _sha256Hex(await blob.arrayBuffer());
    const host = R2_ENDPOINT.replace('https://','');
    const canonHeaders = `content-type:${contentType}\nhost:${host}\nx-amz-content-sha256:${payloadHash}\nx-amz-date:${amzDate}\n`;
    const signedHeaders = 'content-type;host;x-amz-content-sha256;x-amz-date';
    const canonRequest = `PUT\n/${R2_BUCKET}/${path}\n\n${canonHeaders}\n${signedHeaders}\n${payloadHash}`;
    const credScope = `${dateStamp}/auto/s3/aws4_request`;
    const strToSign = `AWS4-HMAC-SHA256\n${amzDate}\n${credScope}\n${await _sha256Hex(new TextEncoder().encode(canonRequest))}`;
    const sigKey = await _hmacSha256(
      await _hmacSha256(await _hmacSha256(await _hmacSha256('AWS4'+R2_SECRET_KEY, dateStamp), 'auto'), 's3'),
      'aws4_request');
    const signature = await _hmacSha256Hex(sigKey, strToSign);
    const auth = `AWS4-HMAC-SHA256 Credential=${R2_ACCESS_KEY}/${credScope},SignedHeaders=${signedHeaders},Signature=${signature}`;
    const resp = await fetch(`${R2_ENDPOINT}/${R2_BUCKET}/${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': contentType, 'x-amz-date': amzDate, 'x-amz-content-sha256': payloadHash, 'Authorization': auth },
      body: blob
    });
    if (!resp.ok) throw new Error(resp.status);
    return `${R2_PUBLIC_URL}/${path}`;
  } catch(e) {
    console.warn('R2 upload failed, keeping base64:', e.message);
    return null;
  }
}

// Uses manual parent-walk instead of .closest() for maximum browser compatibility
document.addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== document) {
    if (el.getAttribute && el.getAttribute('data-fn')) break;
    el = el.parentNode;
  }
  if (!el || el === document) return;
  const fn = el.getAttribute('data-fn');
  const a1 = el.getAttribute('data-a1');
  const a2 = el.getAttribute('data-a2');
  if (typeof window[fn] === 'function') {
    try {
      if (a2 != null) window[fn](a1, a2);
      else if (a1 != null) window[fn](a1);
      else window[fn]();
    } catch(err) {
      console.error('Action error [' + fn + ']:', err);
    }
  }
});

function _discCode(disc) {
  if (!disc) return 'GEN';
  const d = disc.toLowerCase();
  if (d.includes('civil'))  return 'CIV';
  if (d.includes('mep'))    return 'MEP';
  if (d.includes('system')) return 'SYS';
  return disc.replace(/\s+works$/i,'').substring(0,3).toUpperCase();
}
function nextSnagId(pid, discipline, subsystem, building) {
  if (!db.snagCounter) db.snagCounter = {};
  const disc = _discCode(discipline);
  const sub  = (subsystem||'GEN').substring(0,3).toUpperCase().replace(/[^A-Z0-9]/g,'') || 'GEN';
  const bldg = (building||'XXX').toUpperCase().replace(/\s+/g,'');
  const prefix     = `${disc}-${sub}-${bldg}`;
  const counterKey = `${pid}:${prefix}`;
  if (!db.snagCounter[counterKey]) {
    // Seed from any existing snags with the same prefix so numbers are never reused
    let maxSeq = 0;
    db.snags.filter(s => s.projectId === pid && typeof s.number === 'string' && s.number.startsWith(prefix + '-'))
      .forEach(s => { const seq = parseInt(s.number.split('-').pop()); if (!isNaN(seq) && seq > maxSeq) maxSeq = seq; });
    db.snagCounter[counterKey] = maxSeq;
  }
  db.snagCounter[counterKey]++;
  return `${prefix}-${String(db.snagCounter[counterKey]).padStart(6,'0')}`;
}
function numStr(n) {
  if (n === null || n === undefined) return '—';
  if (typeof n === 'number') return '#' + String(n).padStart(3,'0'); // legacy integer snags

// ── PHOTO RESIZE ───────────────────────────────────────────────────────────────
function resizePhoto(file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        let {width: w, height: h} = img;
        if (w > MAX || h > MAX) { if (w > h) { h = h*MAX/w; w = MAX; } else { w = w*MAX/h; h = MAX; } }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function getGPS() {
  const btn = document.getElementById('gpsBtn');
  if (btn) { btn.textContent = '⏳ Getting…'; btn.disabled = true; }
  if (!navigator.geolocation) {
    showManualEntry('Automatic GPS is not available in this browser. Enter coordinates manually below.');
    if (btn) { btn.textContent = '📍 Try Auto'; btn.disabled = false; }
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      S.fd.location = { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), acc: Math.round(pos.coords.accuracy) };
      applyLocation(S.fd.location);
      if (btn) { btn.textContent = '📍 Update'; btn.disabled = false; }
    },
    e => {
      if (btn) { btn.textContent = '📍 Try Auto'; btn.disabled = false; }
      const hint = e.code === 3
        ? 'GPS timed out — try again outdoors, or enter coordinates manually.'
        : 'Automatic GPS is blocked when opening the file directly. Enter coordinates manually using Google Maps (see link below).';
      showManualEntry(hint);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
function showManualEntry(hint) {
  const box = document.getElementById('gpsManual');
  const msg = document.getElementById('gpsHint');
  if (msg) msg.textContent = hint;
  if (box) box.style.display = 'block';
}
function applyLocation(loc) {
  S.fd.location = loc;
  const chip = document.getElementById('gpsChip');
  if (chip) chip.textContent = `${loc.lat}, ${loc.lng}${loc.acc ? ` (±${loc.acc}m)` : ''}`;
  const box = document.getElementById('gpsManual');
  if (box) box.style.display = 'none';
}
function saveManualCoords() {
  const lat = parseFloat(document.getElementById('manualLat')?.value);

    alert('Enter valid coordinates. Latitude: -90 to 90. Longitude: -180 to 180.'); return;

    });
  });

  // Render PIN pad if user selected
  const pinDiv = document.getElementById('ls-pin');
  const sel = S.loginUserId ? db.users.find(u => u.id === S.loginUserId) : null;
  if (sel) {
    pinDiv.style.display = 'block';
    pinDiv.innerHTML = `
      <div class="pin-wrap">
        <div class="pin-label">Enter PIN for ${esc(sel.name)}</div>
        <div class="pin-dots">
          ${[0,1,2,3].map(i => `<div class="pin-dot ${S.pinEntry.length > i ? 'filled' : ''}"></div>`).join('')}
        </div>
        <div class="pin-keypad" id="pin-keypad-grid">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-key" data-k="${n}">${n}</button>`).join('')}
          <button class="pin-key del" data-k="del">⌫</button>
          <button class="pin-key" data-k="0">0</button>
          <button class="pin-key go" data-k="go">→</button>
        </div>
        ${S.pinError ? `<div class="pin-error">${esc(S.pinError)}</div>` : ''}
      </div>`;
    pinDiv.querySelectorAll('[data-k]').forEach(btn => {
      btn.addEventListener('click', function() { pinKey(this.getAttribute('data-k')); });
    });
  } else {
    pinDiv.style.display = 'none';
    pinDiv.innerHTML = '';
  }
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function startSetup() {
  S.currentUser = { id: '__setup__', name: 'Setup', role: 'engineer' };
  go('users');
}

function selectLoginUser(id) {
  S.loginUserId = id;
  S.pinEntry = '';
  S.pinError = '';
  render();
}

function pinKey(k) {
  if (k === 'del') {
    S.pinEntry = S.pinEntry.slice(0, -1);
    S.pinError = '';
    render();
    return;
  }
  if (k === 'go') { doLogin(); return; }
  if (S.pinEntry.length >= 4) return;
  S.pinEntry += k;
  S.pinError = '';
  render();
  if (S.pinEntry.length === 4) setTimeout(doLogin, 120);
}

function doLogin() {
  const u = db.users.find(u => u.id === S.loginUserId);
  if (!u) return;
  if (String(u.pin) !== String(S.pinEntry)) {
    S.pinError = 'Incorrect PIN — try again.';
    S.pinEntry = '';
    render();
    return;
  }
  S.currentUser = { id: u.id, name: u.name, role: u.role, companyId: u.companyId || null };
  S.mode = u.role === 'contractor' ? 'contractor' : 'engineer';
  if (u.role === 'contractor' && u.companyId) S.contractorCompanyId = u.companyId;
  S.pinEntry = '';
  S.pinError = '';
  S.loginUserId = null;
  // Log the login
  if (!db.loginLog) db.loginLog = [];
  db.loginLog.push({ userId: u.id, name: u.name, role: u.role, at: Date.now(), action: 'login' });
  saveDB();
  go('projects');
}

function logout() {
  if (!confirm(`Log out as ${S.currentUser?.name}?`)) return;
  if (!db.loginLog) db.loginLog = [];
  db.loginLog.push({ userId: S.currentUser.id, name: S.currentUser.name, role: S.currentUser.role, at: Date.now(), action: 'logout' });
  saveDB();
  S.currentUser = null;
  S.contractorCompanyId = null;
  saveState();
  render();
}

function upgradeSelfToAdmin() {
  if (db.users.some(u => u.role === 'administrator')) { alert('An Administrator already exists.'); return; }
  const u = db.users.find(u => u.id === S.currentUser?.id);
  if (!u) return;
  if (!confirm('Upgrade "' + u.name + '" to Administrator? This cannot be undone from this screen.')) return;
  u.role = 'administrator';
  S.currentUser = { ...S.currentUser, role: 'administrator' };
  saveDB(); saveState(); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sitesnag-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.projects || !data.snags) {
        document.getElementById('nu_err') && (document.getElementById('nu_err').textContent = 'Invalid backup file.', document.getElementById('nu_err').style.display = 'block');
        return;
      }
      if (!confirm('Replace ALL current data with this backup?\n\nProjects: ' + data.projects.length + '  Snags: ' + data.snags.length + '  Users: ' + (data.users||[]).length + '\n\nThis cannot be undone.')) return;
      db = { projects: [], companies: [], snags: [], users: [], loginLog: [], ...data };
      saveDB();
      S.currentUser = null;
      saveState();
      render();
    } catch(err) {
      alert('Could not read the file — make sure it is a SiteSnag backup (.json).');
    }
  };
  reader.readAsText(file);
}

function toggleCoField() {
  const role = document.getElementById('nu_role')?.value;
  const grp  = document.getElementById('nu_co_group');
  if (grp) grp.style.display = role === 'contractor' ? 'flex' : 'none';
}

function createUser() {
  const name  = document.getElementById('nu_name').value.trim();
  const role  = document.getElementById('nu_role').value;
  const co    = document.getElementById('nu_co')?.value || null;
  const pin   = document.getElementById('nu_pin').value.trim();
  const errEl = document.getElementById('nu_err');
  if (errEl) errEl.style.display = 'none';
  const fail = msg => { if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; } };
  if (!name)                              { fail('Please enter a full name.'); return; }
  if (!/^\d{4}$/.test(pin))              { fail('PIN must be exactly 4 digits (numbers only).'); return; }
  if (role === 'contractor' && !co)       { fail('Please select a company for this contractor.'); return; }
  if (role === 'administrator' && S.currentUser?.role !== 'administrator' && S.currentUser?.id !== '__setup__') {
    fail('Only an Administrator can create another Administrator.'); return;
  }
  db.users.push({ id: uid(), name, role, companyId: co || null, pin, createdAt: Date.now() });
  saveDB();
  if (S.currentUser?.id === '__setup__') {
    S.currentUser = null;
    render();
    return;
  }
  render();
}

function deleteUser(id) {
  if (id === S.currentUser?.id) { alert("You can't delete your own account."); return; }
  if (!confirm('Remove this user?')) return;
  db.users = db.users.filter(u => u.id !== id);
  saveDB();
  render();
}

function viewSnagForm() {
  const editing  = S.snagId ? db.snags.find(s => s.id === S.snagId) : null;
  const photo    = S.fd.photo !== undefined ? S.fd.photo : (editing?.photo ?? null);
  const loc      = S.fd.location || editing?.location;
  const locTxt   = loc ? `${loc.lat}, ${loc.lng}${loc.acc?` (±${loc.acc}m)`:''}` : 'Not captured';
  const descOpts = fieldOptions('description');
  const descPicker = descOpts.length
    ? `<select onchange="fillDesc(this)"
         style="margin-bottom:.45rem;font-size:.85rem;color:var(--soft);border-radius:8px;padding:.5rem .7rem;border:2px solid var(--border);width:100%;background:#fff;font-family:inherit">
         <option value="">↩ Pick a previous description…</option>
         ${descOpts.map(v=>`<option value="${esc(v)}">${esc(v.length>70?v.slice(0,70)+'…':v)}</option>`).join('')}
       </select>`
    : '';

            <option value="">— Select discipline —</option>

          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Subsystem</label>
          <input type="text" id="f_subsystem" list="dl_subsystem"

                 style="width:100%;padding:.55rem .7rem;border:2px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit" />
          <datalist id="dl_subsystem">
            ${discSubs.map(s=>`<option value="${esc(s.name)}">`).join('')}
          </datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Component snagged *</label>
          ${datalist('dl_title','title')}
          <input type="text" id="f_title" list="dl_title" placeholder="e.g. Cracked render"
                 value="${esc(S.fd.f_title??editing?.title??'')}" autocomplete="off"
                 oninput="enforceComponentWords(this)" /></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem">
          ${locationSelects(S.fd.f_building??editing?.building??'', S.fd.f_floor??editing?.floor??'', S.fd.f_room??editing?.room??'', S.fd.f_building_name??editing?.buildingName??'')}
        </div>
        <div class="form-group">
          <label class="form-label">Assign to Contractor</label>
          <select id="f_assigned_to" style="width:100%;padding:.55rem .7rem;border:2px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;background:#fff">
            <option value="">— Unassigned —</option>
            ${db.companies.map(c=>`<option value="${c.id}" ${(S.fd.f_assigned_to??editing?.assignedTo??'')=== c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          ${descPicker}
          <textarea id="f_desc" placeholder="Describe the defect in detail…">${esc(S.fd.f_desc??editing?.description??'')}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Photo</label>
          ${photo
            ? `<div class="photo-wrap"><img src="${photo}" />
               <button class="photo-remove" data-fn="removePhoto">×</button></div>`
            : `<label class="photo-trigger" for="photoIn">📷 Take / Choose Photo</label>
               <input type="file" id="photoIn" accept="image/*" capture="environment" style="display:none"
                      onchange="handlePhoto(this)" />`}
        </div>
        <div class="form-group">
          <label class="form-label">GPS Location <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <div class="loc-row">
            <span class="loc-chip" id="gpsChip">${esc(locTxt)}</span>
            <button class="btn btn-outline btn-sm" id="gpsBtn" data-fn="getGPS">📍 Get GPS</button>
          </div>
          <div id="gpsManual" style="display:none;margin-top:.6rem;padding:.8rem;background:var(--bg);border-radius:10px;border:1.5px solid var(--border)">
            <div id="gpsHint" style="font-size:.8rem;color:var(--soft);margin-bottom:.6rem;line-height:1.45"></div>
            <a href="https://maps.google.com" target="_blank"
               style="display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;font-weight:700;color:var(--blue);text-decoration:none;margin-bottom:.7rem">
              🗺 Open Google Maps to find your coordinates
            </a>
            <div style="font-size:.75rem;color:var(--muted);margin-bottom:.6rem">
              In Google Maps: tap &amp; hold your location → coordinates appear at the top.
            </div>
            <div style="display:flex;gap:.5rem;margin-bottom:.5rem">
              <div style="flex:1">
                <div style="font-size:.72rem;font-weight:700;color:var(--soft);margin-bottom:.25rem">LATITUDE</div>
                <input type="text" id="manualLat" placeholder="e.g. 25.197525"

}

// ── REPORTS & ANALYTICS ───────────────────────────────────────────────────────
function viewReports() {
  const rptPid = S.rptProjectId || '';
  const allSnags = rptPid ? db.snags.filter(s => s.projectId === rptPid) : db.snags;

  const projOpts = [`<option value="">All Projects (${db.snags.length})</option>`,
    ...db.projects.map(p => {
      const n = db.snags.filter(s => s.projectId === p.id).length;
      return `<option value="${p.id}" ${p.id === rptPid ? 'selected' : ''}>${esc(p.name)} (${n})</option>`;
    })].join('');

  const projSel = `<div class="proj-sel-row">
    <label>Scope</label>
    <select onchange="S.rptProjectId=this.value;render()" style="flex:1;padding:.45rem .7rem;font-size:.85rem;border-radius:8px;border:2px solid var(--border)">
      ${projOpts}
    </select></div>`;

  const noData = !allSnags.length;

  // ── KPIs ──
  const total = allSnags.length;
  const sc = {};
  ['open','assigned','pending','accepted','rejected'].forEach(k => { sc[k] = allSnags.filter(x => x.status === k).length; });

  const closedSnags = allSnags.filter(s => s.status === 'accepted');
  const closeDays = closedSnags.map(s => {
    const ev = (s.history||[]).slice().reverse().find(h => h.action.includes('Accepted'));
    return ev ? (ev.at - s.createdAt) / 86400000 : null;
  }).filter(d => d !== null);
  const avgClose = closeDays.length ? (closeDays.reduce((a,b)=>a+b,0)/closeDays.length).toFixed(1) : '—';

  const everAssigned = allSnags.filter(s => s.assignedTo).length;
  const everRejected = allSnags.filter(s => (s.history||[]).some(h => h.action === 'Rejected')).length;
  const rejRate = everAssigned ? Math.round(100 * everRejected / everAssigned) : 0;
  const outstanding = sc.open + sc.assigned;

  const kpiCards = `<div class="rpt-kpi-grid">
    <div class="rpt-kpi"><div class="rpt-kpi-val">${total}</div><div class="rpt-kpi-label">Total Snags</div></div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-val" style="color:var(--amber)">${outstanding}</div>
      <div class="rpt-kpi-label">Outstanding</div>
      <div class="rpt-kpi-sub">${sc.open} open · ${sc.assigned} assigned</div>
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-val" style="color:var(--green)">${sc.accepted}</div>
      <div class="rpt-kpi-label">Closed</div>
      <div class="rpt-kpi-sub">${total ? Math.round(100*sc.accepted/total) : 0}% done</div>
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-val" style="color:var(--purple)">${sc.pending}</div>
      <div class="rpt-kpi-label">Pending Review</div>
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-val">${avgClose === '—' ? '—' : avgClose}<span style="font-size:.85rem;font-weight:400"> d</span></div>
      <div class="rpt-kpi-label">Avg Days Closed</div>
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-val" style="color:${rejRate>25?'var(--red)':rejRate>10?'var(--amber)':'var(--green)'}">${rejRate}%</div>
      <div class="rpt-kpi-label">Rejection Rate</div>
    </div>
  </div>`;

  // ── STATUS BARS ──
  const stColour = { open:'var(--amber)', assigned:'var(--blue)', pending:'var(--purple)', accepted:'var(--green)', rejected:'var(--red)' };
  const maxSt = Math.max(...Object.values(sc), 1);
  const statusBars = ['open','assigned','pending','accepted','rejected'].map(k => {
    const n = sc[k]; const pct = total ? Math.round(100*n/total) : 0;
    return `<div class="bar-row">
      <div class="bar-label">${STATUSES[k]?.label||k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100*n/maxSt)}%;background:${stColour[k]}"></div></div>
      <div class="bar-count">${n} <span style="font-weight:400;color:var(--muted);font-size:.68rem">${pct}%</span></div>
    </div>`;
  }).join('');

  // ── MONTHLY TREND CHART (SVG) ──
  const months = [];
  const nowD = new Date(); nowD.setDate(1); nowD.setHours(0,0,0,0);
  for (let i = 5; i >= 0; i--) {
    const d = new Date(nowD); d.setMonth(d.getMonth() - i);
    months.push({ key: `${d.getFullYear()}-${d.getMonth()}`, label: d.toLocaleDateString(undefined,{month:'short'}), yr: d.getFullYear(), mo: d.getMonth(), opened: 0, closed: 0 });
  }
  allSnags.forEach(s => {
    const d = new Date(s.createdAt); const key = `${d.getFullYear()}-${d.getMonth()}`;
    const m = months.find(x => x.key === key); if (m) m.opened++;
  });
  closedSnags.forEach(s => {
    const ev = (s.history||[]).slice().reverse().find(h => h.action.includes('Accepted')); if (!ev) return;
    const d = new Date(ev.at); const key = `${d.getFullYear()}-${d.getMonth()}`;
    const m = months.find(x => x.key === key); if (m) m.closed++;
  });
  const maxBar = Math.max(...months.map(m => Math.max(m.opened, m.closed)), 1);
  const SVG_H = 130, SVG_PAD_L = 28, SVG_PAD_B = 30, CHART_H = SVG_H - SVG_PAD_B - 10;
  const BW = 18, GAP = 6, GROUP = BW*2+GAP+8;
  const svgW = SVG_PAD_L + months.length * GROUP + 8;
  const monthRects = months.map((m, i) => {
    const x = SVG_PAD_L + i * GROUP;
    const oh = Math.max(2, Math.round(m.opened/maxBar*CHART_H));
    const ch = Math.max(m.closed?2:0, Math.round(m.closed/maxBar*CHART_H));
    return `<rect x="${x}" y="${10+CHART_H-oh}" width="${BW}" height="${oh}" fill="#1d4ed8" rx="3" opacity=".8"/>
      <rect x="${x+BW+4}" y="${10+CHART_H-ch}" width="${BW}" height="${ch}" fill="#15803d" rx="3" opacity=".8"/>
      <text x="${x+BW+2}" y="${SVG_H-10}" text-anchor="middle" font-size="9" fill="#94a3b8">${m.label}</text>`;
  }).join('');
  const gridLines = [0.25,0.5,0.75,1].map(f => {
    const y = 10 + CHART_H - Math.round(f*CHART_H); const v = Math.round(f*maxBar);
    return `<line x1="${SVG_PAD_L-3}" y1="${y}" x2="${svgW-3}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>
      <text x="${SVG_PAD_L-5}" y="${y+3}" text-anchor="end" font-size="8" fill="#94a3b8">${v}</text>`;
  }).join('');
  const legend = `<rect x="${SVG_PAD_L}" y="${SVG_H-6}" width="9" height="6" fill="#1d4ed8" rx="1"/>
    <text x="${SVG_PAD_L+12}" y="${SVG_H-1}" font-size="8" fill="#475569">Opened</text>
    <rect x="${SVG_PAD_L+60}" y="${SVG_H-6}" width="9" height="6" fill="#15803d" rx="1"/>
    <text x="${SVG_PAD_L+73}" y="${SVG_H-1}" font-size="8" fill="#475569">Closed</text>`;
  const timeChart = `<div style="overflow-x:auto">
    <svg width="${svgW}" height="${SVG_H}" style="display:block;min-width:180px">
      ${gridLines}${monthRects}${legend}
    </svg></div>`;

  // ── DAYS TO CLOSE DISTRIBUTION ──
  const buckets = [
    { label:'≤ 7 days',  min:-1,  max:7,   count:0, col:'var(--green)' },
    { label:'8–14 days', min:7,   max:14,  count:0, col:'var(--blue)' },
    { label:'15–30 days',min:14,  max:30,  count:0, col:'var(--amber)' },
    { label:'> 30 days', min:30,  max:1e9, count:0, col:'var(--red)' },
  ];
  closeDays.forEach(d => { const b = buckets.find(b => d > b.min && d <= b.max); if (b) b.count++; });
  const maxBkt = Math.max(...buckets.map(b=>b.count),1);
  const closeBars = buckets.map(b => `<div class="bar-row">
    <div class="bar-label">${b.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100*b.count/maxBkt)}%;background:${b.col}"></div></div>
    <div class="bar-count">${b.count}</div>
  </div>`).join('');

  // ── CONTRACTOR PERFORMANCE TABLE ──
  const coRowsHtml = db.companies.map(c => {
    const cs = allSnags.filter(s => s.assignedTo === c.id); if (!cs.length) return null;
    const cClosed = cs.filter(s => s.status === 'accepted');
    const cPending = cs.filter(s => s.status === 'pending').length;
    const cOpen    = cs.filter(s => s.status === 'assigned').length;
    const cRejected = cs.filter(s => (s.history||[]).some(h => h.action === 'Rejected')).length;
    const cRejRate = cs.length ? Math.round(100*cRejected/cs.length) : 0;
    const cDays = cClosed.map(s => {
      const ev = (s.history||[]).slice().reverse().find(h => h.action.includes('Accepted'));
      return ev ? (ev.at - s.createdAt)/86400000 : null;
    }).filter(d=>d!==null);
    const cAvg = cDays.length ? (cDays.reduce((a,b)=>a+b,0)/cDays.length).toFixed(1) : '—';
    const rCol = cRejRate>25?'var(--red)':cRejRate>10?'var(--amber)':'var(--green)';
    return `<tr>
      <td style="font-weight:600">${esc(c.name)}</td>
      <td style="text-align:center">${cs.length}</td>
      <td style="text-align:center;color:var(--amber);font-weight:700">${cOpen}</td>
      <td style="text-align:center;color:var(--green);font-weight:700">${cClosed.length}</td>
      <td style="text-align:center;color:var(--purple)">${cPending}</td>
      <td style="text-align:center;color:${rCol};font-weight:700">${cRejRate}%</td>
      <td style="text-align:center">${cAvg === '—' ? '—' : cAvg+'d'}</td>
    </tr>`;
  }).filter(Boolean).join('');
  const contractorTable = coRowsHtml
    ? `<div style="overflow-x:auto"><table class="rpt-table">
        <thead><tr>
          <th>Contractor</th><th style="text-align:center">Total</th>
          <th style="text-align:center">Open</th><th style="text-align:center">Closed</th>
          <th style="text-align:center">Pending</th>
          <th style="text-align:center">Rej %</th><th style="text-align:center">Avg Close</th>
        </tr></thead>
        <tbody>${coRowsHtml}</tbody>
      </table></div>`
    : '<div class="empty" style="padding:1rem"><p style="font-size:.85rem">No contractor data yet.</p></div>';

  // ── DISCIPLINE BREAKDOWN ──
  const discRows = DISCIPLINES.map(d => {
    const ds = allSnags.filter(s => s.discipline === d);
    const dOpen   = ds.filter(s => s.status === 'open' || s.status === 'assigned').length;
    const dClosed = ds.filter(s => s.status === 'accepted').length;
    const dPct    = ds.length ? Math.round(100 * dClosed / ds.length) : 0;
    const configSubs = (db.subsystems||[]).filter(s => s.discipline === d).map(s => s.name);
    const activeSubs = [...new Set(ds.map(s => s.subsystem).filter(Boolean))].sort();
    const subDisplay = configSubs.length ? configSubs.map(s => {
      const active = activeSubs.includes(s);
      return `<span style="color:${active?'var(--text)':'var(--muted)'}">${esc(s)}</span>`;
    }).join(', ') : '<span style="color:var(--muted)">None configured</span>';
    return `<tr>
      <td style="font-weight:600">${esc(d)}</td>
      <td style="text-align:center">${ds.length}</td>
      <td style="text-align:center;color:var(--amber);font-weight:700">${dOpen||'·'}</td>
      <td style="text-align:center;color:var(--green);font-weight:700">${dClosed||'·'}</td>
      <td style="text-align:center">${dPct}%</td>
      <td style="font-size:.78rem">${subDisplay}</td>
    </tr>`;
  }).join('');
  const disciplineTable = `<div style="overflow-x:auto"><table class="rpt-table">
      <thead><tr>
        <th>Discipline</th><th style="text-align:center">Total</th>
        <th style="text-align:center">Open</th><th style="text-align:center">Closed</th>
        <th style="text-align:center">% Done</th><th>Subsystems</th>
      </tr></thead>
      <tbody>${discRows}</tbody>
    </table></div>`;

  // ── LOCATION HEATMAP ──
  // Use configured locations as the primary source; fall back to snag data if no locations configured
  const configBuildings = (db.locations || []).map(b => b.building);
  const configFloors    = [...new Set((db.locations || []).flatMap(b => b.floors.map(f => f.name)))].sort();
  const snagBuildings   = [...new Set(allSnags.map(s=>s.building).filter(Boolean))].sort();
  const snagFloors      = [...new Set(allSnags.map(s=>s.floor).filter(Boolean))].sort();
  const buildings = configBuildings.length
    ? [...new Set([...configBuildings, ...snagBuildings])].sort()
    : snagBuildings;
  const floors = configFloors.length
    ? [...new Set([...configFloors, ...snagFloors])].sort()
    : snagFloors;
  let heatHtml = '';
  if (buildings.length && floors.length) {
    const maxCell = Math.max(...buildings.flatMap(b => floors.map(f => allSnags.filter(s=>s.building===b&&s.floor===f).length)), 1);
    heatHtml = `<div style="overflow-x:auto"><table class="rpt-table">
      <thead><tr><th>Bldg \\ Floor</th>${floors.map(f=>`<th style="text-align:center">${esc(f)}</th>`).join('')}<th style="text-align:center">Total</th></tr></thead>
      <tbody>${buildings.map(b => {
        const rowTotal = allSnags.filter(s=>s.building===b).length;
        return `<tr><td style="font-weight:700">${esc(b)}</td>${floors.map(f=>{
          const n = allSnags.filter(s=>s.building===b&&s.floor===f).length;
          const alpha = n ? Math.min(0.75, 0.12 + (n/maxCell)*0.63) : 0;
          const bg = n ? `rgba(220,38,38,${alpha.toFixed(2)})` : 'transparent';
          const fg = alpha > 0.45 ? '#fff' : (n ? 'var(--text)' : 'var(--muted)');
          return `<td class="heat-cell" style="background:${bg};color:${fg}">${n||'·'}</td>`;
        }).join('')}<td style="text-align:center;font-weight:700">${rowTotal||'·'}</td></tr>`;
      }).join('')}</tbody>
    </table></div>`;
  } else if (allSnags.some(s=>s.building||s.floor||s.room)) {
    const locGroups = {};
    allSnags.filter(s=>s.building||s.floor||s.room).forEach(s => {
      const k = [s.building,s.floor,s.room].filter(Boolean).join(' · ');
      locGroups[k] = (locGroups[k]||0) + 1;
    });
    const maxLoc = Math.max(...Object.values(locGroups),1);
    heatHtml = Object.entries(locGroups).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`
      <div class="bar-row">
        <div class="bar-label" style="min-width:110px;max-width:140px">${esc(k)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100*n/maxLoc)}%;background:var(--blue)"></div></div>
        <div class="bar-count">${n}</div>
      </div>`).join('');
  } else {
    heatHtml = '<div style="font-size:.85rem;color:var(--muted);padding:.4rem 0">No building / floor data recorded on snags yet.</div>';
  }

  // ── COMPONENT SNAGGED KEYWORD STRINGS ──
  const compFreq = {};
  allSnags.forEach(s => {
    const key = (s.title||'').trim();
    if (key) compFreq[key] = (compFreq[key]||0) + 1;
  });
  const topWords = Object.entries(compFreq).sort((a,b)=>b[1]-a[1]).slice(0,20);
  const maxWord = topWords.length ? topWords[0][1] : 1;
  const wordBars = topWords.map(([w,n]) => `<div class="bar-row">
    <div class="bar-label" style="text-transform:none;min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(w)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100*n/maxWord)}%;background:var(--purple)"></div></div>
    <div class="bar-count">${n}</div>
  </div>`).join('');

  // ── OPEN SNAG AGE (backlog health) ──
  const nowTs = Date.now();
  const openSnags = allSnags.filter(s => s.status === 'open' || s.status === 'assigned');
  const ageBuckets = [
    { label:'< 7 days',   min:-1, max:7,  count:0, col:'var(--green)' },
    { label:'7–14 days',  min:7,  max:14, count:0, col:'var(--blue)' },
    { label:'14–30 days', min:14, max:30, count:0, col:'var(--amber)' },
    { label:'> 30 days',  min:30, max:1e9,count:0, col:'var(--red)' },
  ];
  openSnags.forEach(s => {
    const d = (nowTs - s.createdAt)/86400000;
    const b = ageBuckets.find(b => d > b.min && d <= b.max); if (b) b.count++;
  });
  const maxAge = Math.max(...ageBuckets.map(b=>b.count),1);
  const ageBars = ageBuckets.map(b=>`<div class="bar-row">
    <div class="bar-label">${b.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100*b.count/maxAge)}%;background:${b.col}"></div></div>
    <div class="bar-count">${b.count}</div>
  </div>`).join('');

  // ── RECENT ACTIVITY LOG ──
  const actLog = [...(db.loginLog||[])].reverse().slice(0,25).map(e => {
    const ic = e.action==='login'?'🔑':'🚪';
    const col = e.action==='login'?'var(--green)':'var(--muted)';
    return `<div style="display:flex;align-items:center;gap:.55rem;padding:.48rem 0;border-bottom:1px solid var(--border);font-size:.82rem">
      <span style="font-size:1rem">${ic}</span>
      <div style="flex:1">
        <span style="font-weight:600">${esc(e.name)}</span>
        <span style="color:${col};font-size:.72rem;font-weight:700;margin-left:.3rem">${e.action}</span>
        <span class="role-badge role-${e.role}" style="margin-left:.3rem">${e.role}</span>
      </div>
      <div style="font-size:.7rem;color:var(--muted);white-space:nowrap">${fmtDateTime(e.at)}</div>
    </div>`;
  }).join('') || '<div style="font-size:.85rem;color:var(--muted);padding:.5rem 0">No activity logged yet.</div>';

  return appBar('Reports & Analytics', 'projects') + `
    <div class="main" style="max-width:640px">
      ${projSel}
      ${noData ? `<div class="alert alert-warn" style="margin-bottom:.5rem">No snags recorded yet. Add snags or import a backup via the Locations tab.</div>` : ''}
      ${kpiCards}

      <div class="sec-label">Status Breakdown</div>
      <div class="card card-body">${statusBars}</div>

      <div class="sec-label">Snags Opened vs Closed — Last 6 Months</div>
      <div class="card card-body">${timeChart}</div>

      <div class="sec-label">Days to Close — Closed Snags</div>
      <div class="card card-body">${closeDays.length ? closeBars : '<div style="font-size:.85rem;color:var(--muted)">No closed snags yet.</div>'}</div>

      <div class="sec-label">Backlog Age — Open &amp; Assigned Snags</div>
      <div class="card card-body">${openSnags.length ? ageBars : '<div style="font-size:.85rem;color:var(--muted)">No outstanding snags.</div>'}</div>

      <div class="sec-label">Discipline Breakdown</div>
      <div class="card">${disciplineTable}</div>

      <div class="sec-label">Contractor Performance</div>
      <div class="card">${contractorTable}</div>

      <div class="sec-label">Location Heatmap — Building × Floor</div>
      <div class="card card-body">${heatHtml}</div>

      <div class="sec-label">Component Snagged (keywords)</div>
      <div class="card card-body">${topWords.length ? wordBars : '<div style="font-size:.85rem;color:var(--muted)">Add snags to see component keyword strings.</div>'}</div>

      <div class="sec-label">Recent User Activity</div>
      <div class="card card-body" style="padding:0 1rem">${actLog}</div>

      ${S.currentUser?.role === 'administrator' ? `
      <div class="sec-label">Export</div>
      <div class="card card-body" style="margin-bottom:.75rem">
        <div style="font-size:.85rem;color:var(--soft);margin-bottom:.75rem;line-height:1.5">
          Export snag data filtered by date range, building, or contractor.
          Exports available in <strong>Excel</strong>, <strong>CSV</strong>, and <strong>PDF</strong> formats.
          PDF includes photos and a branded cover page.
        </div>
        <button class="btn btn-primary" data-fn="openExportModal" style="width:100%;font-size:1rem;padding:.65rem">⬇ Export Snag Data…</button>
      </div>` : ''}

      <div style="height:.5rem"></div>
    </div>` + navBar('reports');
}

function _getExportSnags() {
  const rptPid = S.rptProjectId || '';
  let snags = rptPid ? db.snags.filter(s => s.projectId === rptPid) : db.snags.slice();
  const from = document.getElementById('exp_from')?.value;
  const to   = document.getElementById('exp_to')?.value;
  const bldg = document.getElementById('exp_building')?.value;
  const co   = document.getElementById('exp_co')?.value;
  if (from) snags = snags.filter(s => s.createdAt >= new Date(from).getTime());
  if (to)   snags = snags.filter(s => s.createdAt <= new Date(to).getTime() + 86399999);
  if (bldg) snags = snags.filter(s => s.building === bldg);
  if (co)   snags = snags.filter(s => s.assignedTo === co);
  return snags.sort((a,b) => a.createdAt - b.createdAt);
}

function _snagToRow(s) {
  const closedEv = (s.history||[]).slice().reverse().find(h => h.action.includes('Accepted'));
  const closedBy = closedEv ? closedEv.by : '';
  const closedAt = closedEv ? new Date(closedEv.at).toLocaleDateString('en-GB') : '';
  return [
    s.number || '',
    new Date(s.createdAt).toLocaleDateString('en-GB'),
    s.discipline || '',
    s.subsystem  || '',
    s.title      || '',
    s.building      || '',
    s.buildingName  || '',
    s.floor         || '',
    s.room          || '',
    coName(s.assignedTo),
    (STATUSES[s.status]?.label || s.status),
    s.description|| '',
    closedAt,
    closedBy,
    s.location ? `${s.location.lat?.toFixed(6)},${s.location.lng?.toFixed(6)}` : '',
  ];
}

function doExportCSV() {
  const snags = _getExportSnags();
  const headers = ['Snag No','Date Raised','Discipline','Subsystem','Component Snagged','Building Code','Building Name','Floor','Room','Contractor','Status','Description','Date Closed','Closed By','GPS Coordinates'];
  const rows = [headers, ...snags.map(_snagToRow)];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `SiteSnag_Export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  closeModal();
}

function doExportExcel() {
  if (!window.XLSX) { alert('Excel library not loaded yet. Please wait a moment and try again.'); return; }
  const snags = _getExportSnags();
  const proj = db.projects.find(p => p.id === S.rptProjectId) || db.projects[0];
  const projName = proj ? proj.name : 'All Projects';
  const total = snags.length;
  const closed = snags.filter(s => s.status === 'accepted').length;
  const open   = snags.filter(s => s.status === 'open' || s.status === 'assigned').length;
  const pct    = total ? Math.round(100 * closed / total) : 0;
  const exportedBy = S.currentUser?.name || '';

  const coverData = [
    ['SiteSnag — Snag Register'],
    [],
    ['Project', projName],
    ['Exported', new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})],
    ['Exported By', exportedBy],
    [],
    ['Summary'],
    ['Total Snags', total],
    ['Outstanding', open],
    ['Closed', closed],
    ['Completion', pct + '%'],
  ];

  const headers = ['Snag No','Date Raised','Discipline','Subsystem','Component Snagged','Building Code','Building Name','Floor','Room','Contractor','Status','Description','Date Closed','Closed By','GPS Coordinates'];
  const registerData = [headers, ...snags.map(_snagToRow)];

  const wb = XLSX.utils.book_new();

  const wsCover = XLSX.utils.aoa_to_sheet(coverData);
  wsCover['!cols'] = [{wch:18},{wch:40}];
  XLSX.utils.book_append_sheet(wb, wsCover, 'Cover');

  const wsReg = XLSX.utils.aoa_to_sheet(registerData);
  wsReg['!cols'] = [
    {wch:8},{wch:14},{wch:14},{wch:16},{wch:22},{wch:12},{wch:22},{wch:12},{wch:12},
    {wch:16},{wch:14},{wch:36},{wch:14},{wch:18},{wch:22}
  ];
  wsReg['!autofilter'] = { ref: `A1:O1` };
  XLSX.utils.book_append_sheet(wb, wsReg, 'Snag Register');

  XLSX.writeFile(wb, `SiteSnag_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
  closeModal();
}

async function doExportPDF() {
  if (!window.jspdf) { alert('PDF library not loaded yet. Please wait a moment and try again.'); return; }
  try {
    await _doExportPDFInner();
  } catch(e) {
    alert('PDF export failed: ' + (e.message || e) + '\n\nPlease try again or contact support.');
    console.error('PDF export error:', e);
  }
}

async function _doExportPDFInner() {
  const snags = _getExportSnags();
  const includePhotos = document.getElementById('exp_photos')?.checked !== false;
  const photoSnags = snags.filter(s => s.photo || s.rectification?.photo);

  if (includePhotos && photoSnags.length > 75) {
    const estimatedMB = Math.round(photoSnags.length * 2 * 0.15);
    if (!confirm(`This report contains ${photoSnags.length} snags with photos.\nEstimated file size: ~${estimatedMB} MB.\n\nContinue?`)) return;
  }

  closeModal();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, H = 297;
  const NAVY = [0, 35, 102];
  const GOLD = [255, 215, 0];
  const WHITE = [255, 255, 255];
  const proj = db.projects.find(p => p.id === S.rptProjectId) || db.projects[0];
  const projName = proj ? proj.name : 'All Projects';
  const cfg = db.splashConfig || {};
  const exportedBy = S.currentUser?.name || '';
  const _now = new Date();
  const exportDate = _now.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});
  const exportTime = _now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});

  // ── COVER PAGE ──
  doc.setFillColor(...NAVY);
  doc.rect(0, 0, W, H, 'F');

  // Gold accent bar top
  doc.setFillColor(...GOLD);
  doc.rect(0, 0, W, 6, 'F');

  // App name
  doc.setTextColor(...GOLD);
  doc.setFontSize(36);
  doc.setFont('helvetica', 'bold');
  doc.text('SiteSnag', W / 2, 55, { align: 'center' });

  doc.setFontSize(11);
  doc.setTextColor(200, 210, 230);
  doc.setFont('helvetica', 'normal');
  doc.text('Construction Inspection Report', W / 2, 65, { align: 'center' });

  // Logos row
  let logoY = 85;
  if (cfg.logos && cfg.logos.length) {
    let lx = 20;
    const logoH = 18, logoW = 32;
    for (const src of cfg.logos.slice(0, 5)) {
      try {
        const fmt = src.startsWith('data:image/png') ? 'PNG' : 'JPEG';
        doc.addImage(src, fmt, lx, logoY, logoW, logoH);
        lx += logoW + 6;
      } catch(e) {}
    }
    logoY += 24;
  }

  // Project image
  if (cfg.projectImage) {
    try {
      const fmt = cfg.projectImage.startsWith('data:image/png') ? 'PNG' : 'JPEG';
      doc.addImage(cfg.projectImage, fmt, 30, logoY, W - 60, 55);
      logoY += 60;
    } catch(e) {}
  }

  // Project name
  doc.setTextColor(...GOLD);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  const projLines = doc.splitTextToSize(projName, W - 40);
  doc.text(projLines, W / 2, logoY + 12, { align: 'center' });
  logoY += projLines.length * 10 + 14;

  // Report meta
  doc.setFontSize(10);
  doc.setTextColor(180, 195, 220);
  doc.setFont('helvetica', 'normal');
  doc.text(`Exported: ${exportDate} at ${exportTime}`, W / 2, logoY, { align: 'center' });
  doc.text(`Prepared by: ${exportedBy}`, W / 2, logoY + 6, { align: 'center' });
  doc.text(`${snags.length} snags in this report`, W / 2, logoY + 12, { align: 'center' });

  // Gold accent bar bottom
  doc.setFillColor(...GOLD);
  doc.rect(0, H - 6, W, 6, 'F');

  // ── EXECUTIVE SUMMARY PAGE ──
  doc.addPage();
  const total = snags.length;
  const sc = {};
  ['open','assigned','pending','accepted','rejected'].forEach(k => { sc[k] = snags.filter(x => x.status === k).length; });
  const outstanding = sc.open + sc.assigned;
  const pct = total ? Math.round(100 * sc.accepted / total) : 0;

  // Header bar
  doc.setFillColor(...NAVY);
  doc.rect(0, 0, W, 20, 'F');
  doc.setTextColor(...WHITE);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Executive Summary', 14, 13);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(180, 195, 220);
  doc.text(projName, W - 14, 13, { align: 'right' });

  let y = 32;

  // KPI boxes (2×3 grid)
  const kpis = [
    { label: 'Total Snags', val: total, col: NAVY },
    { label: 'Outstanding', val: outstanding, col: [180, 83, 9] },
    { label: 'Closed', val: sc.accepted, col: [21, 128, 61] },
    { label: 'Pending Review', val: sc.pending, col: [109, 40, 217] },
    { label: 'Open', val: sc.open, col: [220, 38, 38] },
    { label: 'Completion', val: pct + '%', col: [21, 128, 61] },
  ];
  const bw = (W - 28 - 10) / 3, bh = 24;
  kpis.forEach((k, i) => {
    const col = i % 3, row = Math.floor(i / 3);
    const bx = 14 + col * (bw + 5);
    const by = y + row * (bh + 4);
    doc.setFillColor(245, 247, 250);
    doc.roundedRect(bx, by, bw, bh, 3, 3, 'F');
    doc.setTextColor(...k.col);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text(String(k.val), bx + bw / 2, by + 13, { align: 'center' });
    doc.setFontSize(7);
    doc.setTextColor(100, 116, 139);
    doc.setFont('helvetica', 'normal');
    doc.text(k.label, bx + bw / 2, by + 20, { align: 'center' });
  });
  y += 2 * (bh + 4) + 10;

  // Pie chart — status breakdown
  if (total > 0) {
    const pieData = [
      { label:'Open',     value: sc.open,     color:'#dc2626' },
      { label:'Assigned', value: sc.assigned,  color:'#1d4ed8' },
      { label:'Pending',  value: sc.pending,   color:'#7c3aed' },
      { label:'Closed',   value: sc.accepted,  color:'#15803d' },
      { label:'Rejected', value: sc.rejected,  color:'#94a3b8' },
    ].filter(d=>d.value>0);
    const pieImg = _drawPieCanvas(pieData, 200);
    if (pieImg) {
      doc.addImage(pieImg, 'PNG', 14, y, 48, 48);
      // Legend
      let lx = 68, ly = y + 4;
      pieData.forEach(d => {
        const [r,g,bv] = _hexToRgb(d.color);
        doc.setFillColor(r,g,bv); doc.rect(lx, ly-3, 6, 4, 'F');
        doc.setFontSize(8); doc.setTextColor(15,23,42); doc.setFont('helvetica','normal');
        doc.text(`${d.label}: ${d.value} (${Math.round(100*d.value/total)}%)`, lx+8, ly);
        ly += 7;
      });
      y += 56;
    }
  }

  // Status breakdown table
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...NAVY);
  doc.text('Status Breakdown', 14, y);
  y += 5;
  doc.autoTable({
    startY: y,
    head: [['Status', 'Count', '% of Total']],
    body: ['open','assigned','pending','accepted','rejected'].map(k => [
      STATUSES[k]?.label || k,
      sc[k],
      total ? Math.round(100 * sc[k] / total) + '%' : '0%'
    ]),
    headStyles: { fillColor: NAVY, textColor: WHITE, fontSize: 9 },
    bodyStyles: { fontSize: 9 },
    alternateRowStyles: { fillColor: [245, 247, 250] },
    margin: { left: 14, right: 14 },
    theme: 'grid',
  });
  y = doc.lastAutoTable.finalY + 10;

  // Discipline breakdown
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...NAVY);
  doc.text('Discipline Breakdown', 14, y);
  y += 5;
  doc.autoTable({
    startY: y,
    head: [['Discipline', 'Total', 'Open', 'Closed', '% Done']],
    body: DISCIPLINES.map(d => {
      const ds = snags.filter(s => s.discipline === d);
      const dOpen   = ds.filter(s => s.status === 'open' || s.status === 'assigned').length;
      const dClosed = ds.filter(s => s.status === 'accepted').length;
      const dPct    = ds.length ? Math.round(100 * dClosed / ds.length) : 0;
      return [d, ds.length, dOpen, dClosed, dPct + '%'];
    }),
    headStyles: { fillColor: NAVY, textColor: WHITE, fontSize: 9 },
    bodyStyles: { fontSize: 9 },
    alternateRowStyles: { fillColor: [245, 247, 250] },
    margin: { left: 14, right: 14 },
    theme: 'grid',
  });
  y = doc.lastAutoTable.finalY + 10;

  // Contractor summary
  const coRows = db.companies.map(c => {
    const cs = snags.filter(s => s.assignedTo === c.id);
    if (!cs.length) return null;
    return [c.name, cs.length, cs.filter(s => s.status==='open'||s.status==='assigned').length, cs.filter(s=>s.status==='accepted').length, cs.filter(s=>s.status==='pending').length];
  }).filter(Boolean);
  if (coRows.length) {
    if (y > 220) { doc.addPage(); _pdfPageHeader(doc, projName, W, NAVY, WHITE); y = 32; }
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...NAVY);
    doc.text('Contractor Summary', 14, y);
    y += 5;
    doc.autoTable({
      startY: y,
      head: [['Contractor', 'Total', 'Open', 'Closed', 'Pending']],
      body: coRows,
      headStyles: { fillColor: NAVY, textColor: WHITE, fontSize: 9 },
      bodyStyles: { fontSize: 9 },
      alternateRowStyles: { fillColor: [245, 247, 250] },
      margin: { left: 14, right: 14 },
      theme: 'grid',
    });
    y = doc.lastAutoTable.finalY + 10;
  }

  // ── HEATMAP PAGE ──
  const heatBuildings = [...new Set((db.locations||[]).map(b=>b.building).concat(snags.map(s=>s.building).filter(Boolean)))].sort();
  const heatFloors    = [...new Set((db.locations||[]).flatMap(b=>b.floors.map(f=>f.name)).concat(snags.map(s=>s.floor).filter(Boolean)))].sort();
  if (heatBuildings.length && heatFloors.length) {
    if (y > 200) { doc.addPage(); _pdfPageHeader(doc, projName, W, NAVY, WHITE); y = 32; }
    doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(...NAVY);
    doc.text('Location Heatmap — Building × Floor', 14, y); y += 5;
    const heatMax = Math.max(...heatBuildings.flatMap(b=>heatFloors.map(f=>snags.filter(s=>s.building===b&&s.floor===f).length)),1);
    doc.autoTable({
      startY: y,
      head: [['Building', ...heatFloors, 'Total']],
      body: heatBuildings.map(b => {
        const rowTotal = snags.filter(s=>s.building===b).length;
        return [b, ...heatFloors.map(f=>{ const n=snags.filter(s=>s.building===b&&s.floor===f).length; return n||'·'; }), rowTotal||'·'];
      }),
      headStyles: { fillColor: NAVY, textColor: WHITE, fontSize: 8 },
      bodyStyles: { fontSize: 8 },
      margin: { left: 14, right: 14 },
      theme: 'grid',
      didParseCell: (data) => {
        if (data.section==='body' && data.row && data.column && data.column.index>0 && data.column.index<=heatFloors.length) {
          const bldg = heatBuildings[data.row.index];
          const fl   = heatFloors[data.column.index-1];
          const n    = snags.filter(s=>s.building===bldg&&s.floor===fl).length;
          if (n>0) { const alpha = Math.min(0.75, 0.15+(n/heatMax)*0.6); const r=Math.round(220*(1-alpha)+255*alpha); const g=Math.round(38*(1-alpha)+255*alpha); const bv=Math.round(38*(1-alpha)+255*alpha); data.cell.styles.fillColor=[r,g,bv]; }
        }
      }
    });
    y = doc.lastAutoTable.finalY + 10;
  }

  // ── FULL SNAG REGISTER PAGE ──
  doc.addPage();
  _pdfPageHeader(doc, projName, W, NAVY, WHITE);
  y = 32;
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...NAVY);
  doc.text('Snag Register', 14, y);
  y += 5;
  doc.autoTable({
    startY: y,
    head: [['No','Date','Discipline','Component','Building','Building Name','Floor','Contractor','Status']],
    body: snags.map(s => [
      s.number || '',
      new Date(s.createdAt).toLocaleDateString('en-GB'),
      s.discipline || '',
      s.title || '',
      s.building || '',
      s.buildingName || '',
      s.floor || '',
      coName(s.assignedTo),
      STATUSES[s.status]?.label || s.status,
    ]),
    headStyles: { fillColor: NAVY, textColor: WHITE, fontSize: 8 },
    bodyStyles: { fontSize: 8 },
    alternateRowStyles: { fillColor: [245, 247, 250] },
    columnStyles: {
      0: { cellWidth: 10 },
      1: { cellWidth: 16 },
      2: { cellWidth: 20 },
      3: { cellWidth: 28 },
      4: { cellWidth: 12 },
      5: { cellWidth: 26 },
      6: { cellWidth: 12 },
      7: { cellWidth: 20 },
      8: { cellWidth: 18 },
    },
    margin: { left: 14, right: 14 },
    theme: 'grid',
    didParseCell: (data) => {
      if (data.section === 'body' && data.row) {
        const status = snags[data.row.index]?.status;
        if (status === 'accepted') data.cell.styles.textColor = [21, 128, 61];
        else if (status === 'open') data.cell.styles.textColor = [220, 38, 38];
        else if (status === 'assigned') data.cell.styles.textColor = [29, 78, 216];
      }
    }
  });

  // ── SNAG DETAIL PAGES (with photos) ──
  if (includePhotos) {
    for (const snag of snags) {
      doc.addPage();
      _pdfPageHeader(doc, projName, W, NAVY, WHITE);
      let sy = 28;

      // Snag header bar
      doc.setFillColor(245, 247, 250);
      doc.rect(14, sy, W - 28, 14, 'F');
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...NAVY);
      doc.text(`${numStr(snag.number)} — ${snag.title || ''}`, 18, sy + 9);
      sy += 18;

      // Meta row
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(71, 85, 105);
      const meta = [
        snag.discipline || '',
        snag.subsystem  || '',
        [snag.building + (snag.buildingName ? ` (${snag.buildingName})` : ''), snag.floor, snag.room].filter(Boolean).join(' › '),
        coName(snag.assignedTo) || '',
        STATUSES[snag.status]?.label || snag.status,
        new Date(snag.createdAt).toLocaleDateString('en-GB'),
      ].filter(Boolean).join('  ·  ');
      doc.text(doc.splitTextToSize(meta, W - 28), 14, sy);
      sy += 8;

      // Description
      if (snag.description) {
        doc.setFontSize(9);
        doc.setTextColor(15, 23, 42);
        const descLines = doc.splitTextToSize(snag.description, W - 28);
        doc.text(descLines, 14, sy);
        sy += descLines.length * 4.5 + 4;
      }

      // Photos — maintain aspect ratio
      const hasOpen = !!snag.photo;
      const hasRect = !!snag.rectification?.photo;
      const maxPhotoW = (W - 28 - (hasOpen && hasRect ? 6 : 0)) / (hasOpen && hasRect ? 2 : 1);
      const maxPhotoH = Math.min(80, H - sy - 30);

      async function _addPhoto(src, x, label) {
        try {
          // If src is an external URL (R2), fetch and convert to base64 first
          let imgSrc = src;
          if (src && src.startsWith('http')) {
            try {
              const resp = await fetch(src);
              const blob = await resp.blob();
              imgSrc = await new Promise(res => { const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(blob); });
            } catch(e) { return; } // skip photo if fetch fails
          }
          const dims = await new Promise(res => { const i=new Image(); i.onload=()=>res({w:i.naturalWidth,h:i.naturalHeight}); i.onerror=()=>res({w:1,h:1}); i.src=imgSrc; });
          const aspect = dims.h / dims.w;
          let iw = maxPhotoW, ih = iw * aspect;
          if (ih > maxPhotoH) { ih = maxPhotoH; iw = ih / aspect; }
          const fmt = imgSrc.startsWith('data:image/png') ? 'PNG' : 'JPEG';
          doc.addImage(imgSrc, fmt, x, sy, iw, ih);
          doc.setFontSize(7); doc.setTextColor(100,116,139);
          doc.text(label, x, sy + ih + 4);
        } catch(e) {}
      }
      if (hasOpen) await _addPhoto(snag.photo, 14, 'Opening Photo');
      if (hasRect) await _addPhoto(snag.rectification.photo, hasOpen ? 14 + maxPhotoW + 6 : 14, 'Closing Photo');
    }
  }

  // ── PAGE NUMBERS ──
  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(148, 163, 184);
    doc.text(`Page ${i} of ${totalPages}`, W - 14, H - 8, { align: 'right' });
    doc.text('SiteSnag — Construction Inspection', 14, H - 8);
  }

  doc.save(`SiteSnag_Report_${_now.toISOString().slice(0,10)}_${_now.toTimeString().slice(0,5).replace(':','')}.pdf`);
} // end _doExportPDFInner

function _drawPieCanvas(data, size) {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const total = data.reduce((a,d)=>a+d.value,0); if (!total) return null;
    let angle = -Math.PI/2;
    data.forEach(d => {
      const slice = (d.value/total)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(size/2,size/2);
      ctx.arc(size/2,size/2,size/2-2,angle,angle+slice);
      ctx.closePath(); ctx.fillStyle=d.color; ctx.fill();
      angle+=slice;
    });
    return canvas.toDataURL('image/png');
  } catch(e) { return null; }
}
function _hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

}
