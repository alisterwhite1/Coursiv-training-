<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SiteSnag — Construction Inspection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #1d4ed8;
      --blue-bg:     #dbeafe;
      --orange:      #ea580c;
      --orange-bg:   #ffedd5;
      --green:       #15803d;
      --green-bg:    #dcfce7;
      --red:         #dc2626;
      --red-bg:      #fee2e2;
      --purple:      #7c3aed;
      --purple-bg:   #ede9fe;
      --amber:       #b45309;
      --amber-bg:    #fef3c7;
      --bg:          #f1f5f9;
      --card:        #ffffff;
      --text:        #0f172a;
      --soft:        #475569;
      --muted:       #94a3b8;
      --border:      #e2e8f0;
      --radius:      14px;
      --shadow:      0 1px 4px rgba(0,0,0,.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 76px;
      font-size: 15px;
    }

    /* ── App header ── */
    .app-bar {
      background: var(--blue);
      color: #fff;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      position: sticky;
      top: 0;
      z-index: 90;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .app-bar h1 { font-size: 1.05rem; font-weight: 700; flex: 1; line-height: 1.2; }
    .app-bar h1 small { display: block; font-size: .72rem; font-weight: 400; opacity: .7; }
    .back-btn {
      background: none; border: none; color: rgba(255,255,255,.85);
      font-size: 1.4rem; cursor: pointer; padding: 0 .2rem; line-height: 1;
    }
    .back-btn:hover { color: #fff; }
    .user-chip {
      display: flex; align-items: center; gap: .35rem;
      background: rgba(255,255,255,.18); border-radius: 999px;
      padding: .28rem .65rem .28rem .45rem;
      font-size: .78rem; font-weight: 700; cursor: default;
      max-width: 160px;
    }
    .user-chip .avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 800; flex-shrink: 0;
    }
    .user-chip .uname {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .logout-btn {
      background: rgba(255,255,255,.18); border: none; color: #fff;
      border-radius: 8px; padding: .3rem .55rem; font-size: .78rem;
      font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .logout-btn:hover { background: rgba(255,255,255,.3); }

    /* ── Login screen ── */
    .login-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1rem 3rem; background: var(--bg);
    }
    .login-logo { font-size: 2.8rem; margin-bottom: .4rem; }
    .login-title { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: .25rem; }
    .login-sub { font-size: .88rem; color: var(--muted); margin-bottom: 2rem; }
    .user-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .6rem; width: 100%; max-width: 480px; margin-bottom: 1.2rem;
    }
    .user-card {
      background: #fff; border-radius: var(--radius);
      padding: .9rem .8rem; text-align: center; cursor: pointer;
      border: 2.5px solid transparent;
      box-shadow: var(--shadow); transition: all .15s;
    }
    .user-card:hover { border-color: var(--blue); }
    .user-card.selected { border-color: var(--blue); background: var(--blue-bg); }
    .user-card .uc-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      margin: 0 auto .5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; color: #fff;
    }
    .user-card .uc-name { font-weight: 700; font-size: .9rem; margin-bottom: .25rem; }
    .user-card .uc-role {
      font-size: .68rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted);
    }
    .pin-wrap {
      width: 100%; max-width: 480px;
      background: #fff; border-radius: var(--radius);
      padding: 1.2rem; box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .pin-label { font-size: .78rem; font-weight: 800; color: var(--soft); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .5rem; }
    .pin-dots {
      display: flex; gap: .5rem; justify-content: center;
      margin-bottom: .9rem;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      transition: background .12s, border-color .12s;
    }
    .pin-dot.filled { background: var(--blue); border-color: var(--blue); }
    .pin-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem;
    }
    .pin-key {
      padding: .75rem; border: none; border-radius: 10px;
      background: var(--bg); font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: background .1s; font-family: inherit;
      color: var(--text);
    }
    .pin-key:active { background: var(--blue-bg); }
    .pin-key.del { color: var(--red); font-size: 1rem; }
    .pin-key.go  { background: var(--blue); color: #fff; }
    .pin-key.go:active { background: var(--blue); filter: brightness(1.1); }
    .pin-error { color: var(--red); font-size: .82rem; font-weight: 600; text-align: center; margin-top: .5rem; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      display: flex; z-index: 90;
      box-shadow: 0 -2px 12px rgba(0,0,0,.07);
    }
    .nav-btn {
      flex: 1; border: none; background: none;
      padding: .6rem .3rem .45rem;
      display: flex; flex-direction: column; align-items: center; gap: .18rem;
      cursor: pointer; color: var(--muted);
      font-size: .62rem; font-weight: 700; letter-spacing: .02em;
      transition: color .12s; font-family: inherit;
    }
    .nav-btn .ico { font-size: 1.3rem; line-height: 1; }
    .nav-btn.active { color: var(--blue); }

    /* ── Main ── */
    .main { padding: .85rem; max-width: 580px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .card + .card { margin-top: .75rem; }
    .card-body { padding: 1rem; }

    /* ── List items ── */
    .list-item {
      display: flex; align-items: center;
      padding: .82rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; gap: .8rem; transition: background .1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #f8fafc; }
    .list-item:active { background: var(--blue-bg); }

    /* ── Snag list ── */
    .snag-num {
      background: var(--blue); color: #fff;
      font-size: .75rem; font-weight: 800;
      border-radius: 7px; padding: .22rem .48rem;
      min-width: 48px; text-align: center; flex-shrink: 0;
    }
    .snag-info { flex: 1; min-width: 0; }
    .snag-title {
      font-weight: 600; font-size: .93rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .snag-meta { display: flex; align-items: center; gap: .45rem; margin-top: .2rem; flex-wrap: wrap; }
    .snag-co { font-size: .73rem; color: var(--soft); }
    .snag-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .snag-thumb-empty {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--bg); border: 1.5px dashed var(--border);
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; color: var(--muted); font-size: .95rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: .18rem .55rem; border-radius: 999px;
      font-size: .7rem; font-weight: 800; letter-spacing: .03em; white-space: nowrap;
    }
    .b-open     { background: var(--amber-bg);  color: var(--amber); }
    .b-assigned { background: var(--blue-bg);   color: var(--blue); }
    .b-pending  { background: var(--purple-bg); color: var(--purple); }
    .b-accepted { background: var(--green-bg);  color: var(--green); }
    .b-rejected { background: var(--red-bg);    color: var(--red); }
    .role-badge {
      display: inline-flex; align-items: center;
      padding: .15rem .5rem; border-radius: 999px;
      font-size: .68rem; font-weight: 800; letter-spacing: .05em; white-space: nowrap;
    }
    .role-inspector  { background: var(--blue-bg);  color: var(--blue); }
    .role-contractor { background: var(--orange-bg); color: var(--orange); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: .4rem; padding: .62rem 1.25rem; border: none;
      border-radius: 999px; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: filter .15s, transform .1s;
      font-family: inherit; white-space: nowrap;
    }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-danger  { background: var(--red);   color: #fff; }
    .btn-outline { background: none; border: 2px solid var(--border); color: var(--soft); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm { padding: .38rem .85rem; font-size: .82rem; }
    .btn-block { width: 100%; border-radius: var(--radius); }

    .fab {
      position: fixed; bottom: 86px; right: 1.1rem;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--blue); color: #fff; border: none;
      font-size: 1.7rem; cursor: pointer; box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
      z-index: 80; transition: transform .15s;
    }
    .fab:hover { transform: scale(1.07); }
    .fab:active { transform: scale(.9); }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: .38rem; }
    .form-group + .form-group { margin-top: .85rem; }
    .form-label {
      font-size: .73rem; font-weight: 800; color: var(--soft);
      text-transform: uppercase; letter-spacing: .07em;
    }
    input[type=text], input[type=date], input[type=password], textarea, select {
      width: 100%; padding: .62rem .9rem;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: .93rem; font-family: inherit; color: var(--text);
      background: #fff; outline: none; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 88px; }

    .photo-trigger {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .75rem; border: 2px dashed var(--border); border-radius: 10px;
      cursor: pointer; background: var(--bg); color: var(--soft);
      font-size: .9rem; font-weight: 600; transition: all .15s;
    }
    .photo-trigger:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
    .photo-wrap { position: relative; border-radius: 10px; overflow: hidden; }
    .photo-wrap img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
    .photo-remove {
      position: absolute; top: .45rem; right: .45rem;
      background: rgba(0,0,0,.55); color: #fff; border: none;
      border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .95rem;
    }

    .loc-row { display: flex; gap: .5rem; align-items: center; }
    .loc-chip {
      flex: 1; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: .5rem .75rem;
      font-size: .8rem; color: var(--soft); font-family: monospace;
    }

    /* ── Detail view ── */
    .detail-photo { width: 100%; max-height: 260px; object-fit: cover; display: block; }
    .detail-row {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .6rem 0; border-bottom: 1px solid var(--border); font-size: .9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      color: var(--muted); font-size: .73rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em;
      min-width: 88px; flex-shrink: 0; padding-top: .05rem;
    }
    .detail-val { flex: 1; }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: .65rem; }
    .tl-row { display: flex; gap: .65rem; align-items: flex-start; }
    .tl-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      margin-top: .35rem; background: var(--muted);
    }
    .tl-dot.g { background: var(--green); }
    .tl-dot.r { background: var(--red); }
    .tl-dot.b { background: var(--blue); }
    .tl-dot.p { background: var(--purple); }
    .tl-main { font-size: .87rem; font-weight: 600; }
    .tl-when { font-size: .73rem; color: var(--muted); }
    .tl-by   { font-size: .75rem; color: var(--blue); font-weight: 600; margin-top: .1rem; }
    .tl-note { font-size: .8rem; color: var(--soft); margin-top: .1rem; white-space: pre-wrap; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: .5rem; padding: 1rem;
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .action-bar .btn { flex: 1; min-width: 110px; }

    /* ── Alerts ── */
    .alert {
      padding: .7rem 1rem; border-radius: 10px;
      font-size: .87rem; font-weight: 600; margin-bottom: .75rem;
    }
    .alert-info    { background: var(--blue-bg);   color: #1e3a8a; }
    .alert-success { background: var(--green-bg);  color: #14532d; }
    .alert-warn    { background: var(--amber-bg);  color: #78350f; }
    .alert-danger  { background: var(--red-bg);    color: #7f1d1d; }

    /* ── Project list ── */
    .proj-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; flex-shrink: 0;
    }
    .proj-name { font-weight: 700; font-size: .95rem; }
    .proj-count { font-size: .75rem; color: var(--muted); }
    .active-chip {
      margin-left: auto; background: var(--blue); color: #fff;
      font-size: .65rem; font-weight: 800; padding: .14rem .5rem;
      border-radius: 999px; letter-spacing: .04em;
    }

    /* ── Company / User list ── */
    .co-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .usr-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .co-name { flex: 1; font-weight: 600; }
    .del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.1rem; padding: .2rem .35rem;
      transition: color .15s;
    }
    .del-btn:hover { color: var(--red); }

    /* ── Filters ── */
    .filter-row {
      display: flex; gap: .3rem; overflow-x: auto; margin-bottom: .75rem;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: .35rem .8rem; border-radius: 999px;
      font-size: .76rem; font-weight: 700; border: 2px solid var(--border);
      background: #fff; color: var(--soft); cursor: pointer;
      transition: all .12s; font-family: inherit;
    }
    .filter-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── Misc ── */
    .sec-label {
      font-size: .69rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .11em; color: var(--muted); margin: 1.1rem 0 .45rem;
    }
    .empty { text-align: center; padding: 2.8rem 1rem; color: var(--muted); }
    .empty .eico { font-size: 2.2rem; margin-bottom: .4rem; }
    .empty p { font-size: .88rem; }
    .map-link {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .82rem; color: var(--blue); font-weight: 600; text-decoration: none;
    }
    .divider { height: 1px; background: var(--border); }

    /* ── Modal ── */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: #fff; border-radius: 18px 18px 0 0;
      padding: 1.4rem 1.1rem 1.6rem;
      width: 100%; max-width: 500px;
      box-shadow: 0 -4px 32px rgba(0,0,0,.15);
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: .55rem; margin-top: 1rem; }
    .modal-actions .btn { flex: 1; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── DB ─────────────────────────────────────────────────────────────────────────
const DB_KEY    = 'sitesnag_v1';
const STATE_KEY = 'sitesnag_state';
let db = { projects: [], companies: [], snags: [], users: [] };

function loadDB() {
  try { const s = JSON.parse(localStorage.getItem(DB_KEY)); if (s) db = { ...db, ...s }; } catch {}
}
function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ── STATE ──────────────────────────────────────────────────────────────────────
let S = {
  view: 'login',
  projectId: null,
  snagId: null,
  mode: 'inspector',
  contractorCompanyId: null,
  filter: 'all',
  fd: {},
  currentUser: null,    // { id, name, role, companyId }
  loginUserId: null,    // selected on login screen
  pinEntry: '',         // digits typed on login screen
  pinError: '',
};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STATE_KEY));
    if (saved) {
      if (saved.projectId)   S.projectId   = saved.projectId;
      if (saved.mode)        S.mode        = saved.mode;
      if (saved.currentUser) S.currentUser = saved.currentUser;
    }
  } catch {}
  if (S.projectId && !db.projects.find(p => p.id === S.projectId)) S.projectId = null;
  if (!S.projectId && db.projects.length === 1) S.projectId = db.projects[0].id;
  // Validate saved user still exists
  if (S.currentUser) {
    const u = db.users.find(u => u.id === S.currentUser.id);
    if (!u) S.currentUser = null;
  }
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({
    projectId:   S.projectId,
    mode:        S.mode,
    currentUser: S.currentUser,
  }));
}

// ── NAVIGATE ───────────────────────────────────────────────────────────────────
function go(view, params) {
  S.view = view;
  if (params) Object.assign(S, params);
  saveState();
  render();
}

// ── STATUS HELPERS ─────────────────────────────────────────────────────────────
const STATUSES = {
  open:     { label: 'Open',           cls: 'b-open' },
  assigned: { label: 'Assigned',       cls: 'b-assigned' },
  pending:  { label: 'Pending Review', cls: 'b-pending' },
  accepted: { label: 'Accepted ✓',     cls: 'b-accepted' },
  rejected: { label: 'Rejected',       cls: 'b-rejected' },
};
function badge(status) {
  const s = STATUSES[status] || STATUSES.open;
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

// ── DATE ───────────────────────────────────────────────────────────────────────
function fmtDate(ts)     { return ts ? new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}) : '—'; }
function fmtDateTime(ts) { return ts ? new Date(ts).toLocaleString(undefined,{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }

// ── HTML ESCAPE ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── LOOKUPS ────────────────────────────────────────────────────────────────────
function proj()        { return db.projects.find(p => p.id === S.projectId); }
function coName(id)    { const c = db.companies.find(c => c.id === id); return c ? c.name : '—'; }
function snagCount(pid){ return db.snags.filter(s => s.projectId === pid).length; }
function nextNum(pid)  { const ns = db.snags.filter(s => s.projectId === pid).map(s => s.number); return ns.length ? Math.max(...ns)+1 : 1; }
function numStr(n)     { return '#' + String(n).padStart(3,'0'); }
function byMe()        { return S.currentUser ? S.currentUser.name : 'Unknown'; }

// Avatar colour based on name
const COLOURS = ['#1d4ed8','#15803d','#dc2626','#7c3aed','#ea580c','#0891b2','#be185d'];
function avatarColour(name) { let h = 0; for (const c of String(name)) h = (h*31 + c.charCodeAt(0)) & 0xffffff; return COLOURS[Math.abs(h) % COLOURS.length]; }

// ── PHOTO RESIZE ───────────────────────────────────────────────────────────────
function resizePhoto(file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        let {width: w, height: h} = img;
        if (w > MAX || h > MAX) { if (w > h) { h = h*MAX/w; w = MAX; } else { w = w*MAX/h; h = MAX; } }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── GPS ────────────────────────────────────────────────────────────────────────
function getGPS() {
  const btn = document.getElementById('gpsBtn');
  if (btn) { btn.textContent = '⏳ Getting…'; btn.disabled = true; }
  if (!navigator.geolocation) {
    showManualEntry('Automatic GPS is not available in this browser. Enter coordinates manually below.');
    if (btn) { btn.textContent = '📍 Try Auto'; btn.disabled = false; }
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      S.fd.location = { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), acc: Math.round(pos.coords.accuracy) };
      applyLocation(S.fd.location);
      if (btn) { btn.textContent = '📍 Update'; btn.disabled = false; }
    },
    e => {
      if (btn) { btn.textContent = '📍 Try Auto'; btn.disabled = false; }
      const hint = e.code === 3
        ? 'GPS timed out — try again outdoors, or enter coordinates manually.'
        : 'Automatic GPS is blocked when opening the file directly. Enter coordinates manually using Google Maps (see link below).';
      showManualEntry(hint);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
function showManualEntry(hint) {
  const box = document.getElementById('gpsManual');
  const msg = document.getElementById('gpsHint');
  if (msg) msg.textContent = hint;
  if (box) box.style.display = 'block';
}
function applyLocation(loc) {
  S.fd.location = loc;
  const chip = document.getElementById('gpsChip');
  if (chip) chip.textContent = `${loc.lat}, ${loc.lng}${loc.acc ? ` (±${loc.acc}m)` : ''}`;
  const box = document.getElementById('gpsManual');
  if (box) box.style.display = 'none';
}
function saveManualCoords() {
  const lat = parseFloat(document.getElementById('manualLat')?.value);
  const lng = parseFloat(document.getElementById('manualLng')?.value);
  if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    alert('Enter valid coordinates. Latitude: -90 to 90. Longitude: -180 to 180.'); return;
  }
  applyLocation({ lat: lat.toFixed(6), lng: lng.toFixed(6), acc: null });
}

// ── FORM HELPERS ───────────────────────────────────────────────────────────────
function snap() {
  ['f_title','f_desc','f_building','f_floor','f_room','f_rect_comment'].forEach(id => {
    const el = document.getElementById(id);
    if (el) S.fd[id] = el.value;
  });
}
function fieldOptions(field) {
  const seen = new Set();
  db.snags.filter(s => s.projectId === S.projectId && s[field]).forEach(s => seen.add(s[field].trim()));
  return [...seen].sort((a, b) => a.localeCompare(b));
}
function datalist(id, field) {
  return `<datalist id="${id}">${fieldOptions(field).map(v=>`<option value="${esc(v)}">`).join('')}</datalist>`;
}
function fillDesc(sel) {
  if (!sel.value) return;
  const ta = document.getElementById('f_desc');
  if (ta) ta.value = sel.value;
  sel.selectedIndex = 0;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  // Redirect to login if not logged in
  if (!S.currentUser) {
    document.getElementById('app').innerHTML = viewLogin();

  const views = {
    projects:             viewProjects,

}

      <div class="uc-name">${esc(u.name)}</div>
      <div class="uc-role">${u.role}</div>
    </div>`).join('');

  const pinUI = sel ? `
    <div class="pin-wrap">
      <div class="pin-label">Enter PIN for ${esc(sel.name)}</div>
      <div class="pin-dots">
        ${[0,1,2,3].map(i => `<div class="pin-dot ${S.pinEntry.length > i ? 'filled' : ''}"></div>`).join('')}
      </div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-key" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <button class="pin-key del" onclick="pinKey('del')">⌫</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key go" onclick="pinKey('go')">→</button>
      </div>
      ${S.pinError ? `<div class="pin-error">${esc(S.pinError)}</div>` : ''}
    </div>` : '';

  return `
    <div class="login-wrap" style="padding-bottom:1.5rem">
      <div class="login-logo">🏗</div>
      <div class="login-title">SiteSnag</div>
      <div class="login-sub">Construction Quality Inspection</div>
      ${noUsers ? `
        <div class="card card-body" style="width:100%;max-width:480px;text-align:center">
          <div style="font-size:1.5rem;margin-bottom:.5rem">👋</div>
          <div style="font-weight:700;margin-bottom:.4rem">First time setup</div>
          <div style="font-size:.88rem;color:var(--muted);margin-bottom:1rem">Create your first user to get started.</div>
          <button class="btn btn-primary btn-block" onclick="S.currentUser={id:'__setup__',name:'Setup',role:'inspector'};go('users')">
            Create First User
          </button>
        </div>` : `
        <div class="user-grid">${userCards}</div>

    </div>`;
}

function selectLoginUser(id) {
  S.loginUserId = id;
  S.pinEntry = '';
  S.pinError = '';
  render();
}

function pinKey(k) {
  if (k === 'del') {
    S.pinEntry = S.pinEntry.slice(0, -1);
    S.pinError = '';
    render();
    return;
  }
  if (k === 'go') { doLogin(); return; }
  if (S.pinEntry.length >= 4) return;
  S.pinEntry += k;
  S.pinError = '';
  render();
  if (S.pinEntry.length === 4) setTimeout(doLogin, 120);
}

function doLogin() {
  const u = db.users.find(u => u.id === S.loginUserId);
  if (!u) return;
  if (String(u.pin) !== String(S.pinEntry)) {
    S.pinError = 'Incorrect PIN — try again.';
    S.pinEntry = '';
    render();
    return;
  }
  S.currentUser = { id: u.id, name: u.name, role: u.role, companyId: u.companyId || null };
  S.mode = u.role === 'contractor' ? 'contractor' : 'inspector';
  if (u.role === 'contractor' && u.companyId) S.contractorCompanyId = u.companyId;
  S.pinEntry = '';
  S.pinError = '';
  S.loginUserId = null;
  // Log the login
  if (!db.loginLog) db.loginLog = [];
  db.loginLog.push({ userId: u.id, name: u.name, role: u.role, at: Date.now(), action: 'login' });
  saveDB();
  go('projects');
}

function logout() {
  if (!confirm(`Log out as ${S.currentUser?.name}?`)) return;
  if (!db.loginLog) db.loginLog = [];
  db.loginLog.push({ userId: S.currentUser.id, name: S.currentUser.name, role: S.currentUser.role, at: Date.now(), action: 'logout' });
  saveDB();
  S.currentUser = null;
  S.contractorCompanyId = null;
  saveState();
  render();
}

function toggleCoField() {
  const role = document.getElementById('nu_role')?.value;
  const grp  = document.getElementById('nu_co_group');
  if (grp) grp.style.display = role === 'contractor' ? 'flex' : 'none';
}

function createUser() {
  const name = document.getElementById('nu_name').value.trim();
  const role = document.getElementById('nu_role').value;
  const co   = document.getElementById('nu_co')?.value || null;
  const pin  = document.getElementById('nu_pin').value.trim();
  if (!name) { alert('Enter a name.'); return; }
  if (!/^\d{4}$/.test(pin)) { alert('PIN must be exactly 4 digits.'); return; }
  if (role === 'contractor' && !co) { alert('Select a company for this contractor.'); return; }
  db.users.push({ id: uid(), name, role, companyId: co || null, pin, createdAt: Date.now() });
  saveDB();
  // If this was the setup flow, log them in as the first inspector
  if (S.currentUser?.id === '__setup__') {
    S.currentUser = null;
    render();
    return;
  }
  render();
}

function deleteUser(id) {
  if (id === S.currentUser?.id) { alert("You can't delete your own account."); return; }
  if (!confirm('Remove this user?')) return;
  db.users = db.users.filter(u => u.id !== id);
  saveDB();
  render();
}

// ── SNAG FORM ──────────────────────────────────────────────────────────────────
function viewSnagForm() {
  const editing  = S.snagId ? db.snags.find(s => s.id === S.snagId) : null;
  const photo    = S.fd.photo !== undefined ? S.fd.photo : (editing?.photo ?? null);
  const loc      = S.fd.location || editing?.location;
  const locTxt   = loc ? `${loc.lat}, ${loc.lng}${loc.acc?` (±${loc.acc}m)`:''}` : 'Not captured';
  const descOpts = fieldOptions('description');
  const descPicker = descOpts.length
    ? `<select onchange="fillDesc(this)"
         style="margin-bottom:.45rem;font-size:.85rem;color:var(--soft);border-radius:8px;padding:.5rem .7rem;border:2px solid var(--border);width:100%;background:#fff;font-family:inherit">
         <option value="">↩ Pick a previous description…</option>
         ${descOpts.map(v=>`<option value="${esc(v)}">${esc(v.length>70?v.slice(0,70)+'…':v)}</option>`).join('')}
       </select>`
    : '';

  return appBar(editing?`Edit ${numStr(editing.number)}`:'New Snag', editing?'snag-detail':'snag-list') + `
    <div class="main">
      <div class="card card-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          ${datalist('dl_title','title')}
          <input type="text" id="f_title" list="dl_title" placeholder="e.g. Cracked render at column B3"
                 value="${esc(S.fd.f_title??editing?.title??'')}" autocomplete="off" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem">
          <div class="form-group">
            <label class="form-label">Building</label>
            ${datalist('dl_building','building')}
            <input type="text" id="f_building" list="dl_building" placeholder="e.g. A"
                   value="${esc(S.fd.f_building??editing?.building??'')}" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label">Floor</label>
            ${datalist('dl_floor','floor')}
            <input type="text" id="f_floor" list="dl_floor" placeholder="e.g. G, 1"
                   value="${esc(S.fd.f_floor??editing?.floor??'')}" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label">Room</label>
            ${datalist('dl_room','room')}
            <input type="text" id="f_room" list="dl_room" placeholder="e.g. 101"
                   value="${esc(S.fd.f_room??editing?.room??'')}" autocomplete="off" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          ${descPicker}
          <textarea id="f_desc" placeholder="Describe the defect in detail…">${esc(S.fd.f_desc??editing?.description??'')}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Photo</label>
          ${photo
            ? `<div class="photo-wrap"><img src="${photo}" />
               <button class="photo-remove" onclick="snap();S.fd.photo=null;render()">×</button></div>`
            : `<label class="photo-trigger" for="photoIn">📷 Take / Choose Photo</label>
               <input type="file" id="photoIn" accept="image/*" capture="environment" style="display:none"
                      onchange="handlePhoto(this)" />`}
        </div>
        <div class="form-group">
          <label class="form-label">GPS Location <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <div class="loc-row">
            <span class="loc-chip" id="gpsChip">${esc(locTxt)}</span>
            <button class="btn btn-outline btn-sm" id="gpsBtn" onclick="getGPS()">📍 Get GPS</button>
          </div>
          <div id="gpsManual" style="display:none;margin-top:.6rem;padding:.8rem;background:var(--bg);border-radius:10px;border:1.5px solid var(--border)">
            <div id="gpsHint" style="font-size:.8rem;color:var(--soft);margin-bottom:.6rem;line-height:1.45"></div>
            <a href="https://maps.google.com" target="_blank"
               style="display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;font-weight:700;color:var(--blue);text-decoration:none;margin-bottom:.7rem">
              🗺 Open Google Maps to find your coordinates
            </a>
            <div style="font-size:.75rem;color:var(--muted);margin-bottom:.6rem">
              In Google Maps: tap &amp; hold your location → coordinates appear at the top.
            </div>
            <div style="display:flex;gap:.5rem;margin-bottom:.5rem">
              <div style="flex:1">
                <div style="font-size:.72rem;font-weight:700;color:var(--soft);margin-bottom:.25rem">LATITUDE</div>
                <input type="text" id="manualLat" placeholder="e.g. 25.197525"
                       value="${esc(S.fd.location?.lat??'')}" style="border-radius:8px;padding:.5rem .7rem;font-size:.9rem" />
              </div>
              <div style="flex:1">
                <div style="font-size:.72rem;font-weight:700;color:var(--soft);margin-bottom:.25rem">LONGITUDE</div>
                <input type="text" id="manualLng" placeholder="e.g. 55.274288"
                       value="${esc(S.fd.location?.lng??'')}" style="border-radius:8px;padding:.5rem .7rem;font-size:.9rem" />
              </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="saveManualCoords()">✓ Set Location</button>
          </div>
        </div>
      </div>
      <div style="margin-top:.75rem;display:flex;gap:.55rem">
        <button class="btn btn-outline" style="flex:1" onclick="go(S.snagId?'snag-detail':'snag-list')">Cancel</button>
        <button class="btn btn-primary" style="flex:2" onclick="saveSnag()">${editing?'Save Changes':'+ Add Snag'}</button>
      </div>
    </div>` + navBar('');
}

// ── CONTRACTOR RESPOND ─────────────────────────────────────────────────────────
function viewContractorRespond() {
  const snag = db.snags.find(s => s.id === S.snagId);
  if (!snag) return viewSnagList();
  const photo = S.fd.rectPhoto;
  const lastReject = snag.history?.slice().reverse().find(h => h.action === 'Rejected');

  return appBar(`Rectify ${numStr(snag.number)}`, 'snag-detail') + `
    <div class="main">
      <div class="alert alert-warn">${esc(snag.title)}</div>
      ${lastReject?.note ? `<div class="alert alert-danger"><strong>Inspector note:</strong> ${esc(lastReject.note)}</div>` : ''}
      <div class="card card-body">
        <div class="form-group">
          <label class="form-label">Rectification Photo *</label>
          ${photo
            ? `<div class="photo-wrap"><img src="${photo}" />
               <button class="photo-remove" onclick="snap();S.fd.rectPhoto=null;render()">×</button></div>`
            : `<label class="photo-trigger" for="rectPhotoIn">📷 Photograph Completed Work</label>
               <input type="file" id="rectPhotoIn" accept="image/*" capture="environment" style="display:none"
                      onchange="handleRectPhoto(this)" />`}
        </div>
        <div class="form-group">
          <label class="form-label">What Was Done</label>
          <textarea id="f_rect_comment" placeholder="Describe the rectification work carried out…">${esc(S.fd.f_rect_comment??'')}</textarea>
        </div>
      </div>
      <div style="margin-top:.75rem;display:flex;gap:.55rem">
        <button class="btn btn-outline" style="flex:1" onclick="go('snag-detail',{snagId:'${snag.id}'})">Cancel</button>
        <button class="btn btn-success" style="flex:2" onclick="submitRect('${snag.id}')">✓ Submit for Inspection</button>
      </div>
    </div>` + navBar('');
}

// ── COMPANIES ──────────────────────────────────────────────────────────────────
function viewCompanies() {
  const items = db.companies.length
    ? db.companies.map(c => `
        <div class="list-item">
          <div class="co-avatar">${c.name.charAt(0).toUpperCase()}</div>
          <span class="co-name">${esc(c.name)}</span>
          <button class="del-btn" onclick="deleteCo('${c.id}')">×</button>
        </div>`).join('')
    : `<div class="empty"><div class="eico">🏢</div><p>No companies yet.</p></div>`;

  return appBar('Contractor Companies', 'projects') + `
    <div class="main">
      <div class="card">${items}</div>
      <div class="sec-label">Add Company</div>
      <div class="card card-body">
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input type="text" id="newCoName" placeholder="e.g. Smith Plastering Ltd" />
        </div>
        <div style="margin-top:.75rem">
          <button class="btn btn-primary btn-block" onclick="addCo()">+ Add Company</button>
        </div>
      </div>
    </div>` + navBar('companies');
}

// ── CHROME ─────────────────────────────────────────────────────────────────────
function appBar(title, backView, sub) {
  const back = backView ? `<button class="back-btn" onclick="go('${backView}')">&#8592;</button>` : '';
  const user = S.currentUser && S.currentUser.id !== '__setup__'
    ? `<div class="user-chip">
         <div class="avatar" style="background:${avatarColour(S.currentUser.name)}">${S.currentUser.name.charAt(0).toUpperCase()}</div>
         <span class="uname">${esc(S.currentUser.name)}</span>
       </div>
       <button class="logout-btn" onclick="logout()">Log out</button>`
    : '';
  return `<div class="app-bar">${back}<h1>${title}${sub?`<small>${sub}</small>`:''}</h1>${user}</div>`;
}

function navBar(active) {
  const snagClick = S.projectId
    ? "go('snag-list')"
    : db.projects.length === 1
      ? `selectProject('${db.projects[0].id}')`
      : "go('projects')";
  const isInspector = S.currentUser?.role === 'inspector';
  return `<nav class="bottom-nav">
    <button class="nav-btn ${active==='projects'?'active':''}" onclick="go('projects')">
      <span class="ico">📂</span>Projects
    </button>
    <button class="nav-btn ${active==='snag-list'?'active':''}" onclick="${snagClick}">
      <span class="ico">📋</span>Snags
    </button>
    <button class="nav-btn ${active==='companies'?'active':''}" onclick="go('companies')">
      <span class="ico">🏢</span>Companies
    </button>
    <button class="nav-btn ${active==='users'?'active':''}" onclick="go('users')">
      <span class="ico">👤</span>Users
    </button>
  </nav>`;
}

// ── MODALS ─────────────────────────────────────────────────────────────────────
function openAssignModal(snagId) {
  if (!db.companies.length) { alert('Add companies first (Companies tab).'); return; }
  const snag = db.snags.find(s => s.id === snagId);
  const opts = db.companies.map(c =>
    `<option value="${c.id}" ${c.id===snag.assignedTo?'selected':''}>${esc(c.name)}</option>`).join('');
  modal(`<div class="modal-title">Assign to Contractor</div>
    <div class="form-group">
      <label class="form-label">Company</label>
      <select id="m_co">${opts}</select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAssign('${snagId}')">Assign →</button>
    </div>`);
}

function openRejectModal(snagId) {
  modal(`<div class="modal-title" style="color:var(--red)">Reject Rectification</div>
    <div class="form-group">
      <label class="form-label">Reason</label>
      <textarea id="m_note" placeholder="Why is this not acceptable?" style="min-height:80px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doReject('${snagId}')">✗ Reject</button>
    </div>`);
}

function modal(html) {
  closeModal();
  document.body.insertAdjacentHTML('beforeend',
    `<div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
       <div class="modal-box">${html}</div>
     </div>`);
}
function closeModal() { document.getElementById('modalBack')?.remove(); }

// ── ACTIONS ────────────────────────────────────────────────────────────────────
function setFilter(f) { S.filter = f; render(); }
function selectProject(id) { S.projectId = id; S.filter = 'all'; go('snag-list'); }

function createProject() {
  const n = document.getElementById('newProjName').value.trim();
  if (!n) { alert('Enter a project name.'); return; }
  db.projects.push({ id: uid(), name: n, createdAt: Date.now() });
  saveDB();
  S.projectId = db.projects[db.projects.length-1].id;
  go('snag-list');
}

function addCo() {
  const n = document.getElementById('newCoName').value.trim();
  if (!n) { alert('Enter a company name.'); return; }
  if (db.companies.some(c => c.name.toLowerCase() === n.toLowerCase())) { alert('Company already exists.'); return; }
  db.companies.push({ id: uid(), name: n });
  saveDB(); render();
}
function deleteCo(id) {
  if (!confirm('Remove this company?')) return;
  db.companies = db.companies.filter(c => c.id !== id);
  saveDB(); render();
}

async function handlePhoto(input) {
  const f = input.files[0]; if (!f) return;
  snap(); S.fd.photo = await resizePhoto(f); render();
}
async function handleRectPhoto(input) {
  const f = input.files[0]; if (!f) return;
  snap(); S.fd.rectPhoto = await resizePhoto(f); render();
}

function saveSnag() {
  const titleEl  = document.getElementById('f_title');
  const title    = titleEl.value.trim();
  if (!title) { titleEl.focus(); alert('Title is required.'); return; }
  const desc     = document.getElementById('f_desc').value.trim();
  const building = document.getElementById('f_building').value.trim();
  const floor    = document.getElementById('f_floor').value.trim();
  const room     = document.getElementById('f_room').value.trim();

  if (S.snagId) {
    const snag = db.snags.find(s => s.id === S.snagId);
    snag.title = title; snag.description = desc;
    snag.building = building; snag.floor = floor; snag.room = room;
    if (S.fd.photo !== undefined) snag.photo = S.fd.photo;
    if (S.fd.location) snag.location = S.fd.location;
    snag.history = snag.history || [];
    snag.history.push({ action: 'Edited', by: byMe(), at: Date.now() });
    saveDB(); S.fd = {};
    go('snag-detail', { snagId: S.snagId });
  } else {
    const snag = {
      id: uid(), projectId: S.projectId, number: nextNum(S.projectId),
      title, description: desc, building, floor, room,
      photo: S.fd.photo||null, location: S.fd.location||null,
      status: 'open', assignedTo: null,
      createdAt: Date.now(), rectification: null,
      history: [{ action: 'Created', by: byMe(), at: Date.now() }]
    };
    db.snags.push(snag);
    saveDB(); S.fd = {};
    go('snag-detail', { snagId: snag.id });
  }
}

function deleteSnag(id) {
  if (!confirm('Permanently delete this snag?')) return;
  db.snags = db.snags.filter(s => s.id !== id);
  saveDB(); go('snag-list');
}

function doAssign(snagId) {
  const cid = document.getElementById('m_co').value;
  if (!cid) return;
  const snag = db.snags.find(s => s.id === snagId);
  snag.assignedTo = cid;
  snag.status = 'assigned';
  snag.history = snag.history || [];
  snag.history.push({ action: `Assigned to ${coName(cid)}`, by: byMe(), at: Date.now() });
  saveDB(); closeModal(); render();
}

function acceptSnag(snagId) {
  if (!confirm('Accept this rectification and close the snag?')) return;
  const snag = db.snags.find(s => s.id === snagId);
  snag.status = 'accepted';
  snag.history = snag.history || [];
  snag.history.push({ action: 'Accepted ✓ — Snag Closed', by: byMe(), at: Date.now() });
  saveDB(); render();
}

function doReject(snagId) {
  const note = document.getElementById('m_note').value.trim();
  const snag = db.snags.find(s => s.id === snagId);
  snag.status = 'rejected';
  snag.history = snag.history || [];
  snag.history.push({ action: 'Rejected', by: byMe(), note, at: Date.now() });
  saveDB(); closeModal(); render();
}

function submitRect(snagId) {
  const comment = document.getElementById('f_rect_comment').value.trim();
  const photo   = S.fd.rectPhoto;
  if (!photo) { alert('A photo is required.'); return; }
  const snag = db.snags.find(s => s.id === snagId);
  snag.rectification = { photo, comment, by: byMe(), submittedAt: Date.now() };
  snag.status = 'pending';
  snag.history = snag.history || [];
  snag.history.push({ action: 'Rectification submitted', by: byMe(), note: comment, at: Date.now() });
  saveDB(); S.fd = {};
  go('snag-detail', { snagId });
}

// ── INIT ───────────────────────────────────────────────────────────────────────
loadDB();
loadState();
render();
</script>
</body>
</html>
