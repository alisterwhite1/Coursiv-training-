<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #2ecc71;
      --green-dark:   #27ae60;
      --green-deep:   #1e8449;
      --green-light:  #d5f5e3;
      --green-xlight: #eafaf1;
      --cream:        #faf9f5;
      --cream-card:   #ffffff;
      --cream-dark:   #ede9db;
      --cream-input:  #f5f3ec;
      --text:         #1e2d21;
      --text-soft:    #4a6350;
      --muted:        #8aaa90;
      --radius-lg:    22px;
      --radius-md:    14px;
      --radius-sm:    10px;
      --shadow:       0 2px 20px rgba(46,204,113,.09), 0 1px 4px rgba(0,0,0,.04);
      --shadow-hover: 0 6px 32px rgba(46,204,113,.16), 0 2px 8px rgba(0,0,0,.06);
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 3rem 1.25rem 5rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .header-icon {
      font-size: 2.4rem;
      line-height: 1;
      margin-bottom: .6rem;
    }
    header h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -.6px;
      color: var(--text);
    }
    header h1 span { color: var(--green-dark); }
    header p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
      letter-spacing: .01em;
    }

    /* ── Grid ── */
    .grid {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--cream-card);
      border-radius: var(--radius-lg);
      padding: 1.9rem 1.9rem 1.7rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: var(--shadow-hover); }
    .card.wide { grid-column: 1 / -1; }

    .card-label {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--green-dark);
    }

    /* ── Streak ── */
    .streak-hero {
      display: flex;
      align-items: flex-end;
      gap: .5rem;
    }
    .streak-num {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      color: var(--green-dark);
      letter-spacing: -2px;
    }
    .streak-unit {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--muted);
      padding-bottom: .65rem;
    }
    .streak-best {
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .streak-best strong { color: var(--green-dark); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding: .65rem 1.3rem;
      border: none;
      border-radius: 999px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s, transform .1s, box-shadow .15s;
      letter-spacing: .01em;
    }
    .btn:active { transform: scale(.95); }
    .btn-primary {
      background: var(--green);
      color: #fff;
      box-shadow: 0 3px 12px rgba(46,204,113,.35);
    }
    .btn-primary:hover {
      filter: brightness(1.07);
      box-shadow: 0 5px 18px rgba(46,204,113,.45);
    }
    .btn-ghost {
      background: var(--green-light);
      color: var(--green-deep);
    }
    .btn-ghost:hover { background: #c1edd5; }
    .btn-sm { padding: .42rem .9rem; font-size: .83rem; }

    .done-chip {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .55rem 1.1rem;
      background: var(--green-xlight);
      border: 1.5px solid var(--green-light);
      color: var(--green-deep);
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 700;
    }
    .done-chip .check { font-size: 1rem; }

    /* ── Progress ── */
    .progress-wrap { display: flex; flex-direction: column; gap: .5rem; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .8rem;
      color: var(--muted);
      font-weight: 500;
    }
    .progress-meta strong { color: var(--text-soft); font-weight: 700; }
    .progress-track {
      height: 9px;
      background: var(--cream-dark);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green) 0%, var(--green-dark) 100%);
      border-radius: 999px;
      transition: width .55s cubic-bezier(.4,0,.2,1);
    }
    .progress-fill.full { background: linear-gradient(90deg, var(--green-dark) 0%, var(--green-deep) 100%); }

    /* ── Day dots ── */
    .dot-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .3rem;
    }
    .dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
    }
    .dot-day-label {
      font-size: .62rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--cream-dark);
      transition: background .2s;
    }
    .dot.filled { background: var(--green); }
    .dot.today-empty { background: var(--cream-dark); box-shadow: 0 0 0 2px var(--green); }

    /* ── Words this week card ── */
    .big-stat {
      display: flex;
      align-items: flex-end;
      gap: .55rem;
      flex-wrap: wrap;
    }
    .big-num {
      font-size: 4rem;
      font-weight: 900;
      line-height: 1;
      color: var(--green-dark);
      letter-spacing: -1.5px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .32rem .75rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .badge-green { background: var(--green-light); color: var(--green-deep); }
    .badge-amber { background: #fef3cd; color: #8a5e0a; }

    .week-range {
      font-size: .78rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Word list card ── */
    .word-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .6rem;
    }
    .word-card-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
    }
    .total-chip {
      font-size: .78rem;
      color: var(--muted);
      background: var(--cream-input);
      padding: .25rem .7rem;
      border-radius: 999px;
      font-weight: 600;
    }

    .word-input-row {
      display: flex;
      gap: .6rem;
    }
    .word-inputs {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }
    .word-input {
      width: 100%;
      padding: .65rem 1rem;
      border: 2px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-size: .92rem;
      color: var(--text);
      background: var(--cream-input);
      outline: none;
      transition: border-color .15s, background .15s;
      font-family: inherit;
    }
    .word-input:focus {
      border-color: var(--green);
      background: #fff;
    }
    .word-input::placeholder { color: var(--muted); }

    .word-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .4rem;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 3px;
    }
    .word-list::-webkit-scrollbar { width: 4px; }
    .word-list::-webkit-scrollbar-track { background: transparent; }
    .word-list::-webkit-scrollbar-thumb { background: var(--green-light); border-radius: 99px; }

    .word-item {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .65rem .9rem;
      background: var(--cream-input);
      border-radius: var(--radius-sm);
      animation: fadeUp .2s ease both;
      border: 1.5px solid transparent;
      transition: border-color .15s;
    }
    .word-item:hover { border-color: var(--green-light); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
    .word-texts { flex: 1; min-width: 0; }
    .word-text {
      font-size: .93rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .word-translation {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: .1rem;
    }
    .word-date {
      font-size: .72rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .word-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--cream-dark);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 .15rem;
      transition: color .15s;
      flex-shrink: 0;
    }
    .word-del:hover { color: #e05555; }

    .empty-state {
      color: var(--muted);
      font-size: .88rem;
      padding: .6rem .9rem;
      text-align: center;
    }

    /* ── Divider ── */
    .card-divider {
      height: 1px;
      background: var(--cream-dark);
      margin: 0 -.1rem;
    }

    /* ── Reset link ── */
    .reset-link {
      font-size: .74rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      align-self: flex-start;
      transition: color .15s;
      font-family: inherit;
    }
    .reset-link:hover { color: #e05555; }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🌿</div>
  <h1>Language <span>Tracker</span></h1>
  <p>Study a little every day — it all adds up.</p>
</header>

<div class="grid">

  <!-- ── Streak Card ── -->
  <div class="card">
    <span class="card-label">Study Streak</span>

    <div class="streak-hero">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-unit">days</div>
    </div>

    <div class="streak-best" id="bestStreakLine"></div>

    <div id="streakAction"></div>

    <div class="card-divider"></div>

    <!-- Week dots -->
    <div class="dot-grid" id="dotGrid"></div>

    <!-- Week progress bar -->
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Days studied this week</span>
        <strong id="weekDaysMeta">0 / 7</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="weekBar" style="width:0%"></div>
      </div>
    </div>

    <button class="reset-link" id="resetStreak">Reset streak &amp; history</button>
  </div>

  <!-- ── Words This Week Card ── -->
  <div class="card">
    <span class="card-label">Words This Week</span>

    <div class="big-stat">
      <div class="big-num" id="weekWordNum">0</div>
      <div id="weekBadge"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Weekly goal</span>
        <strong id="wordGoalMeta">0 / 20</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="wordBar" style="width:0%"></div>
      </div>
    </div>

    <div class="week-range" id="weekRange"></div>
  </div>

  <!-- ── Word List Card ── -->
  <div class="card wide">
    <div class="word-card-header">
      <span class="word-card-title">Word List</span>
      <span class="total-chip" id="totalChip">0 words</span>
    </div>

    <div class="word-input-row">
      <div class="word-inputs">
        <input class="word-input" id="wordInput" type="text"
               placeholder="Word or phrase…" maxlength="80" autocomplete="off" />
        <input class="word-input" id="translationInput" type="text"
               placeholder="Translation or note (optional)…" maxlength="120" autocomplete="off" />
      </div>
      <button class="btn btn-primary" id="addWordBtn">Add</button>
    </div>

    <ul class="word-list" id="wordList"></ul>
  </div>

</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const KEY = 'lang_tracker_v2';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function defaultData() {
  return {
    streak: 0,
    bestStreak: 0,
    lastStudyDate: null,
    studyDates: [],
    words: []   // [{id, text, translation, date}]
  };
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function startOfWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function shortDate(dateStr) {
  return new Date(dateStr + 'T00:00:00')
    .toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// ── State ─────────────────────────────────────────────────────────────────────
let data = { ...defaultData(), ...load() };

// ── Streak ────────────────────────────────────────────────────────────────────
function markStudied() {
  const t = today();
  if (data.lastStudyDate === t) return;

  const yesterday = addDays(t, -1);
  data.streak = data.lastStudyDate === yesterday ? data.streak + 1 : 1;
  data.bestStreak = Math.max(data.bestStreak || 0, data.streak);
  data.lastStudyDate = t;
  if (!data.studyDates.includes(t)) data.studyDates.push(t);
  save(data);
  render();
}

// ── Words ─────────────────────────────────────────────────────────────────────
function addWord() {
  const wordEl = document.getElementById('wordInput');
  const transEl = document.getElementById('translationInput');
  const text = wordEl.value.trim();
  if (!text) { wordEl.focus(); return; }
  data.words.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    text,
    translation: transEl.value.trim(),
    date: today()
  });
  save(data);
  wordEl.value = '';
  transEl.value = '';
  wordEl.focus();
  render();
}

function removeWord(id) {
  data.words = data.words.filter(w => w.id !== id);
  save(data);
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const GOAL = 20;

function render() {
  const t = today();
  const weekStart = startOfWeek(t);
  const weekDays  = Array.from({length:7}, (_,i) => addDays(weekStart, i));

  // Streak
  document.getElementById('streakNum').textContent = data.streak;

  const best = data.bestStreak || data.streak;
  const bestEl = document.getElementById('bestStreakLine');
  bestEl.innerHTML = `Best streak: <strong>${best} day${best !== 1 ? 's' : ''}</strong>`;

  // Action button
  const doneToday = data.lastStudyDate === t;
  const actionEl = document.getElementById('streakAction');
  if (doneToday) {
    actionEl.innerHTML = `<span class="done-chip"><span class="check">✓</span> Studied today</span>`;
  } else {
    actionEl.innerHTML = `<button class="btn btn-primary" id="markBtn">Mark today as studied</button>`;
    document.getElementById('markBtn').addEventListener('click', markStudied);
  }

  // Day dots with labels
  const dotGrid = document.getElementById('dotGrid');
  dotGrid.innerHTML = weekDays.map((d, i) => {
    const filled   = data.studyDates.includes(d);
    const isToday  = d === t;
    const dotClass = filled ? 'dot filled' : (isToday ? 'dot today-empty' : 'dot');
    return `<div class="dot-col">
      <span class="dot-day-label">${DAY_LABELS[i]}</span>
      <div class="${dotClass}" title="${d}${isToday ? ' (today)' : ''}"></div>
    </div>`;
  }).join('');

  // Week progress bar
  const studied = weekDays.filter(d => data.studyDates.includes(d)).length;
  document.getElementById('weekDaysMeta').textContent = `${studied} / 7`;
  document.getElementById('weekBar').style.width = `${(studied/7)*100}%`;

  // Words this week
  const weekEnd   = addDays(weekStart, 6);
  const weekWords = data.words.filter(w => w.date >= weekStart && w.date <= weekEnd);
  const wCount    = weekWords.length;

  document.getElementById('weekWordNum').textContent = wCount;
  const pct = Math.min(wCount / GOAL * 100, 100);
  const barEl = document.getElementById('wordBar');
  barEl.style.width = `${pct}%`;
  barEl.className = 'progress-fill' + (wCount >= GOAL ? ' full' : '');
  document.getElementById('wordGoalMeta').textContent = `${wCount} / ${GOAL}`;
  document.getElementById('weekRange').textContent =
    `${shortDate(weekStart)} – ${shortDate(weekEnd)}`;

  const badge = document.getElementById('weekBadge');
  if (wCount >= GOAL) {
    badge.innerHTML = `<span class="badge badge-green">✓ Goal reached!</span>`;
  } else {
    const left = GOAL - wCount;
    badge.innerHTML = `<span class="badge badge-amber">${left} to go</span>`;
  }

  // Total words chip
  const total = data.words.length;
  document.getElementById('totalChip').textContent =
    `${total} word${total !== 1 ? 's' : ''} total`;

  // Word list
  renderWords();
}

function renderWords() {
  const ul = document.getElementById('wordList');
  if (!data.words.length) {
    ul.innerHTML = `<li class="empty-state">No words yet — add your first one above.</li>`;
    return;
  }
  ul.innerHTML = [...data.words].reverse().map(w => `
    <li class="word-item">
      <div class="word-texts">
        <div class="word-text">${esc(w.text)}</div>
        ${w.translation ? `<div class="word-translation">${esc(w.translation)}</div>` : ''}
      </div>
      <span class="word-date">${shortDate(w.date)}</span>
      <button class="word-del" title="Remove" onclick="removeWord('${w.id}')">×</button>
    </li>
  `).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Reset streak ──────────────────────────────────────────────────────────────
document.getElementById('resetStreak').addEventListener('click', () => {
  if (!confirm('Reset your streak and study history? (Your word list will be kept.)')) return;
  data.streak = 0;
  data.bestStreak = 0;
  data.lastStudyDate = null;
  data.studyDates = [];
  save(data);
  render();
});

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('addWordBtn').addEventListener('click', addWord);
['wordInput','translationInput'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') addWord();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
